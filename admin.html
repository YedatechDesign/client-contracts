<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>yeda — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d2680;--blue:#1a56db;--bl:#e8f0fe;--bm:#c7d7fc;
  --sub:#374151;--mu:#6b7280;--fa:#9ca3af;--bg:#f4f6fb;
  --bdr:#e5e7eb;--gr:#059669;--rd:#dc2626;--or:#d97706;--r:12px;--sh:0 2px 8px rgba(0,0,0,.07)}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--sub);direction:rtl}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lbox{background:#fff;border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);
      padding:48px 40px;max-width:380px;width:100%;text-align:center}
.llogo{font-size:2rem;font-weight:900;color:var(--navy);letter-spacing:-2px;margin-bottom:4px}
.lsub{color:var(--mu);font-size:.83rem;margin-bottom:28px}
.linp{width:100%;border:1.5px solid var(--bdr);border-radius:9px;padding:12px 14px;
      font-family:'Heebo',sans-serif;font-size:.95rem;direction:ltr;text-align:center;
      margin-bottom:12px;transition:border-color .2s}
.linp:focus{outline:none;border-color:var(--blue)}
.lbtn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
.lbtn:hover{background:var(--navy)}
.lerr{color:var(--rd);font-size:.8rem;margin-top:8px;display:none}

/* APP */
#app{display:none}
.topbar{background:#fff;border-bottom:1px solid var(--bdr);height:56px;
        display:flex;align-items:center;justify-content:space-between;padding:0 24px;
        position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tlogo{font-size:1.35rem;font-weight:900;color:var(--navy);letter-spacing:-1.5px}
.tabs{display:flex;gap:5px}
.tab{padding:6px 14px;background:none;border:1.5px solid var(--bdr);border-radius:8px;
     font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--mu);transition:all .15s}
.tab:hover{border-color:var(--bm);color:var(--blue)}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab .sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-left:5px;vertical-align:middle}
.lout{background:none;border:1px solid var(--bdr);border-radius:7px;padding:5px 11px;
      font-family:'Heebo',sans-serif;font-size:.76rem;color:var(--mu);cursor:pointer}
.lout:hover{border-color:var(--rd);color:var(--rd)}

/* MAIN */
.main{max-width:1000px;margin:0 auto;padding:22px 18px 80px}
.slot-panel{display:none}.slot-panel.active{display:block}
.signed-banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:9px;padding:11px 16px;
               display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sbtext{font-size:.85rem;font-weight:700;color:#92400e}
.resetbtn{background:#fff;border:1px solid #f59e0b;color:#d97706;border-radius:7px;
          padding:4px 12px;font-family:'Heebo',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer}

/* SECTION ACCORDIONS */
.acc{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;
          cursor:pointer;transition:background .15s;user-select:none}
.acc-head:hover{background:#f9fafb}
.acc-hl{display:flex;align-items:center;gap:9px}
.acc-ico{width:30px;height:30px;border-radius:7px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
.acc-t{font-size:.9rem;font-weight:800;color:var(--navy)}
.acc-arr{color:var(--mu);transition:transform .2s;font-size:.78rem}
.acc.open .acc-arr{transform:rotate(180deg)}
.acc-body{display:none;padding:16px 18px;border-top:1px solid var(--bdr)}
.acc.open .acc-body{display:block}

/* FORM FIELDS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.s1{grid-template-columns:1fr}
.f{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mu)}
.fi{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 11px;
    font-family:'Heebo',sans-serif;font-size:.87rem;color:var(--sub);
    transition:border-color .2s;background:#fafbff;width:100%}
.fi:focus{outline:none;border-color:var(--blue);background:#fff}
textarea.fi{resize:vertical;min-height:76px;line-height:1.65}

/* BLOCKS */
.bl-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.bl-card{border:1.5px solid var(--bdr);border-radius:9px;overflow:hidden}
.bl-top{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--bg)}
.bl-num{width:21px;height:21px;border-radius:50%;background:var(--blue);color:#fff;
        font-size:.68rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bl-ti{flex:1;border:none;background:transparent;font-family:'Heebo',sans-serif;
       font-size:.86rem;font-weight:700;color:var(--navy);padding:2px 4px;border-radius:4px}
.bl-ti:focus{outline:1px solid var(--bm);background:#fff}
.bdel{background:none;border:none;cursor:pointer;color:var(--fa);font-size:1.1rem;
      padding:2px 6px;border-radius:4px;line-height:1;transition:color .15s;flex-shrink:0}
.bdel:hover{color:var(--rd)}
.bl-body{padding:7px 11px}
.bl-tx{width:100%;border:none;background:transparent;font-family:'Heebo',sans-serif;
       font-size:.81rem;color:var(--sub);resize:vertical;min-height:58px;line-height:1.7;padding:2px}
.bl-tx:focus{outline:1px solid var(--bm);background:#fafbff;border-radius:4px}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;
         background:var(--bl);border:1.5px dashed var(--bm);color:var(--blue);
         border-radius:8px;padding:8px;font-family:'Heebo',sans-serif;font-size:.81rem;
         font-weight:700;cursor:pointer;width:100%;transition:all .15s}
.add-btn:hover{background:var(--blue);color:#fff;border-style:solid}

/* WHY */
.why-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.why-row{display:flex;align-items:center;gap:7px}
.why-row input{flex:1}

/* CLIENTS */
.cl-chk{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:5px}
.cl-c{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 6px;cursor:pointer;
      text-align:center;transition:all .15s;position:relative}
.cl-c:hover{border-color:var(--bm)}
.cl-c.sel{border-color:var(--blue);background:var(--bl)}
.cl-c img{width:100%;height:34px;object-fit:contain;margin-bottom:4px;filter:grayscale(.4)}
.cl-c.sel img{filter:none}
.cl-c-name{font-size:.64rem;font-weight:700;color:var(--sub)}
.cl-c.sel .cl-c-name{color:var(--blue)}
.ckm{position:absolute;top:4px;left:4px;width:14px;height:14px;border-radius:50%;
     background:var(--blue);display:none;align-items:center;justify-content:center}
.ckm svg{width:8px;height:8px;stroke:#fff;fill:none;stroke-width:2.5}
.cl-c.sel .ckm{display:flex}

/* TABLE ROWS */
.tbl-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.tbl-row{display:flex;align-items:center;gap:7px}
.tbl-row input{flex:1}.tbl-row .bdel{padding:6px 7px;flex-shrink:0}
.pay-rows{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.pay-row{border:1px solid var(--bdr);border-radius:9px;padding:10px 12px}
.pay-rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.pay-rn{font-size:.7rem;font-weight:800;color:var(--mu)}

/* TOKEN PACKAGES */
.tok-pkg{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.tok-row{display:flex;align-items:center;gap:7px}
.tok-row input{flex:1}

/* LINK + TOKEN */
.link-area{background:#f0f3ff;border:1px solid var(--bm);border-radius:9px;padding:12px 14px;margin-top:8px}
.link-ttl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);margin-bottom:7px}
.link-url{font-size:.77rem;color:var(--blue);font-weight:600;direction:ltr;text-align:left;
          word-break:break-all;margin-bottom:8px;background:#fff;border:1px solid var(--bm);
          border-radius:6px;padding:7px 10px}
.link-btns{display:flex;gap:8px}
.cp-btn{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px 14px;
        font-family:'Heebo',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;transition:background .15s}
.cp-btn:hover{background:var(--navy)}
.cp-btn.ok{background:var(--gr)}
.new-token-btn{background:#fff;border:1.5px solid var(--bm);color:var(--blue);border-radius:7px;
               padding:7px 12px;font-family:'Heebo',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer}
.new-token-btn:hover{background:var(--bl)}

/* VERSION HISTORY */
.ver-hist{margin-top:12px}
.ver-ttl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);margin-bottom:8px}
.ver-list{display:flex;flex-direction:column;gap:6px}
.ver-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
          background:#fff;border:1px solid var(--bdr);border-radius:8px}
.ver-name{font-size:.81rem;font-weight:700;color:var(--sub)}
.ver-date{font-size:.71rem;color:var(--mu)}
.ver-dl{background:none;border:1px solid var(--bdr);color:var(--mu);border-radius:6px;
        padding:4px 10px;font-family:'Heebo',sans-serif;font-size:.72rem;cursor:pointer}
.ver-dl:hover{border-color:var(--blue);color:var(--blue)}
.ver-empty{font-size:.8rem;color:var(--fa);text-align:center;padding:10px}

/* SAVE BAR */
.save-bar{position:sticky;bottom:0;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
          border-top:1px solid var(--bdr);padding:12px 16px;margin:0 -18px;z-index:50;
          display:flex;gap:10px;align-items:center}
.save-btn{flex:1;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:9px;
          font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;
          display:flex;align-items:center;justify-content:center;gap:7px;
          transition:all .2s;box-shadow:0 3px 10px rgba(26,86,219,.22)}
.save-btn:hover:not(:disabled){background:var(--navy)}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.ver-btn{padding:12px 18px;background:#fff;border:2px solid var(--or);color:var(--or);
         border-radius:9px;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:800;
         cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;
         transition:all .2s;flex-shrink:0}
.ver-btn:hover:not(:disabled){background:#fff7ed}
.ver-btn:disabled{opacity:.5;cursor:not-allowed}
.ssp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
     border-radius:50%;animation:spin .6s linear infinite;display:none}
.vsp{width:16px;height:16px;border:2px solid rgba(217,119,6,.3);border-top-color:var(--or);
     border-radius:50%;animation:spin .6s linear infinite;display:none}
.save-msg{font-size:.78rem;font-weight:700;min-width:60px;text-align:center}
.save-msg.ok{color:var(--gr)}.save-msg.err{color:var(--rd)}

@media(max-width:700px){
  .topbar{padding:0 10px}.tabs{gap:3px}.tab{padding:4px 9px;font-size:.73rem}
  .main{padding:14px 10px 80px}.frow{grid-template-columns:1fr}
  .cl-chk{grid-template-columns:repeat(3,1fr)}
  .link-btns{flex-wrap:wrap}.save-bar{flex-wrap:wrap}
}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="lw">
  <div class="lbox">
    <div class="llogo">yeda</div>
    <div class="lsub">ממשק ניהול חוזים</div>
    <input class="linp" type="password" id="pw" placeholder="סיסמה"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">כניסה</button>
    <div class="lerr" id="lerr">סיסמה שגויה</div>
  </div>
</div>
<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tlogo">yeda admin</div>
    <div class="tabs" id="tabRow">

    <div class="slot-panel" id="p2"></div>
    <div class="slot-panel" id="p3"></div>
  </div>
</div>

  milestones:[

let _pw='', _cur=1, _sd={1:null,2:null,3:null};

function genToken(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}

function doLogin(){
  const v=document.getElementById('pw').value;
  if(v!==PASS){document.getElementById('lerr').style.display='block';return;}
  _pw=v;document.getElementById('lw').style.display='none';document.getElementById('app').style.display='block';
  loadAll();
}
function doLogout(){_pw='';document.getElementById('lw').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('pw').value=''}

async function loadAll(){
  for(let s=1;s<=3;s++){
    try{
      const r=await fetch(N8N_LOAD,{method:'POST',headers:{'Content-Type':'application/json'},
        cache:'no-store',body:JSON.stringify({slot:s,password:_pw,mode:'admin'})});
      const raw=await r.json();
      let d=null;
      if(Array.isArray(raw)){
        const first=raw[0]; d=first?.json||first||null;
      } else if(raw&&typeof raw==='object'){
        if(raw.slot!==undefined||raw.matara||raw.title||raw.milestones){ d=raw; }
        else if(raw.json&&(raw.json.slot!==undefined||raw.json.title||raw.json.matara)){ d=raw.json; }
        else {
          const str=raw.rawText||raw.body||raw.data||raw.content||'';
          if(typeof str==='string'&&str.includes('"slot"')){ try{d=JSON.parse(str);}catch(e){} }
          if(!d&&Object.keys(raw).length>2) d=raw;
        }
      }
      _sd[s]=(d&&(d.title||d.client_name||d.matara||d.slot))?d:null;
    }catch(e){_sd[s]=null;}
    renderPanel(s);updateTab(s);
  }
}

function switchSlot(s){
  _cur=s;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.s===s));
  document.querySelectorAll('.slot-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+s).classList.add('active');
}

function updateTab(s){
  const d=_sd[s];
  const nm=d?.client_name||'חוזה '+s;
  const dot=d?.signed?'<span class="sdot"></span>':'';
  document.querySelector(`.tab[data-s="${s}"]`).innerHTML=dot+nm;
}

function getLink(s){
  const tok=_sd[s]?.link_token||_sd[s]?.token||'';
  return tok?(PROP_URL+'?slot='+s+'&token='+tok):'';
}

function getWhy(s){return [...document.querySelectorAll(`[id^="wi-${s}-"]`)].map(e=>e.value).filter(Boolean)}
function getSel(s){return ALL_CLIENTS.map(c=>c.id).filter(id=>document.getElementById('cc-'+s+'-'+id)?.classList.contains('sel'))}
function getCostRows(s){return [...document.querySelectorAll(`[id^="cr-${s}-"]`)].filter(e=>e.id.endsWith('-0')).map(e=>{const i=e.id.split('-')[2];return[document.getElementById(`cr-${s}-${i}-0`)?.value||'',document.getElementById(`cr-${s}-${i}-1`)?.value||'']})}
function getPayments(s){return [...document.querySelectorAll(`[id^="pay-${s}-"]`)].map(e=>{const i=e.id.split('-')[2];return{num:parseInt(i)+1,title:document.getElementById(`pt-${s}-${i}`)?.value||'',desc:document.getElementById(`pd-${s}-${i}`)?.value||'',total:document.getElementById(`pp-${s}-${i}`)?.value||''}})}
function getOpts(s){return [...document.querySelectorAll(`[id^="op-${s}-"]`)].filter(e=>e.id.endsWith('-t')).map(e=>{const i=e.id.split('-')[2];return{title:document.getElementById(`op-${s}-${i}-t`)?.value||'',price:document.getElementById(`op-${s}-${i}-p`)?.value||''}})}
function getTokPkgs(s){return [...document.querySelectorAll(`[id^="tp-${s}-"]`)].filter(e=>e.id.endsWith('-a')).map(e=>{const i=e.id.split('-')[2];return{amount:document.getElementById(`tp-${s}-${i}-a`)?.value||'',original:document.getElementById(`tp-${s}-${i}-o`)?.value||'',sale:document.getElementById(`tp-${s}-${i}-s`)?.value||''}})}
function getTokExs(s){return [...document.querySelectorAll(`[id^="te-${s}-"]`)].map(e=>e.value).filter(Boolean)}
function getTerms(s){return [...document.querySelectorAll(`[id^="trm-${s}-"]`)].map(e=>{const id=e.id.slice((`trm-${s}-`).length);return{id,title:document.getElementById('trt-'+s+'-'+id)?.value||'',text:document.getElementById('trb-'+s+'-'+id)?.value||''}})}

function buildPayload(s,keepToken){
  const tok=keepToken?(_sd[s]?.link_token||_sd[s]?.token||''):genToken();
  return {
    slot:s, password:pw, signed:false, link_token:tok, token:tok,
    title:document.getElementById(s+'-title')?.value||'',
    client_name:document.getElementById(s+'-cname')?.value||'',
    matara:document.getElementById(s+'-matara')?.value||'',
    milestones:getMs(s),
    why_intro:document.getElementById(s+'-whyintro')?.value||'',
    why_items:getWhy(s),
    selected_clients:getSel(s),
    costs_subtitle:document.getElementById(s+'-csubt')?.value||'',
    costs_rows:getCostRows(s), payments:getPayments(s), optional:getOpts(s),
    token_packages:getTokPkgs(s), token_examples:getTokExs(s),
    terms:getTerms(s),
    versions:_sd[s]?.versions||[]
  };
}

/* ── SAVE ── */
async function saveSlot(s){
  const btn=document.getElementById('sbtn'+s),sp=document.getElementById('ssp'+s),tx=document.getElementById('stxt'+s),msg=document.getElementById('smsg'+s);
  btn.disabled=true;sp.style.display='block';tx.textContent='שומר...';
  const payload=buildPayload(s,true); // keep existing token
  try{
    const r=await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('שגיאה '+r.status);
    _sd[s]=payload;updateTab(s);
    // update link display
    const ldisp=document.getElementById('linkDisplay-'+s);
    if(ldisp)ldisp.textContent=getLink(s);
    msg.textContent='✓ נשמר';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',3000);
  }catch(e){msg.textContent='שגיאה: '+e.message;msg.className='save-msg err';}
  btn.disabled=false;sp.style.display='none';tx.textContent='💾 שמור שינויים';
}

/* ── SAVE VERSION (PDF snapshot) ── */
async function saveVersion(s){
  const btn=document.getElementById('vbtn'+s),sp=document.getElementById('vsp'+s),tx=document.getElementById('vtxt'+s),msg=document.getElementById('smsg'+s);
  btn.disabled=true;sp.style.display='block';tx.textContent='יוצר PDF...';
  const payload=buildPayload(s,true);
  const vNum=(payload.versions.length)+1;
  try{
    const r=await fetch(N8N_SAVE_VER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...payload,version_number:vNum})});
    if(!r.ok)throw new Error('שגיאה '+r.status);
    const resp=await r.json();
    const cn=payload.client_name||'contract';
    const today=new Date();const d=pad(today.getDate())+'.'+pad(today.getMonth()+1)+'.'+today.getFullYear();
    const newVer={name:`${cn}-v${vNum} (${d})`,date:d,url:resp.pdf_url||''};
    payload.versions=[...payload.versions,newVer];
    // save updated payload with new version
    await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    _sd[s]=payload;
    // refresh version list
    const vl=document.getElementById('verlist-'+s);
    if(vl)vl.innerHTML=payload.versions.map(v=>`
      <div class="ver-item">
        <div><div class="ver-name">${h(v.name)}</div><div class="ver-date">${h(v.date)}</div></div>
        ${v.url?`<button class="ver-dl" onclick="window.open('${v.url}','_blank')">⬇ הורד</button>`:''}
      </div>`).join('');
    msg.textContent='✓ גרסה נשמרה';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',4000);
  }catch(e){msg.textContent='שגיאה: '+e.message;msg.className='save-msg err';}
  btn.disabled=false;sp.style.display='none';tx.textContent='📄 שמור גרסה';
}

/* ── REFRESH TOKEN (new unique link) ── */
async function refreshToken(s){
  if(!confirm('זה ייצור קישור חדש — הקישור הקודם יפסיק לעבוד. להמשיך?'))return;
  const payload=buildPayload(s,false); // generate new token
  const msg=document.getElementById('smsg'+s);
  try{
    await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    _sd[s]=payload;
    const newLink=getLink(s);
    const ldisp=document.getElementById('linkDisplay-'+s);if(ldisp)ldisp.textContent=newLink;
    msg.textContent='🔄 קישור חודש';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',3000);
  }catch(e){msg.textContent='שגיאה';msg.className='save-msg err';}
}

async function resetSlot(s){
  if(!confirm('לאפס החוזה? ניתן יהיה לחתום שוב'))return;
  const d=_sd[s]||{};
  const payload={...d,slot:s,signed:false,signer_name:'',signer_date:'',signer_email:''};
  try{await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});_sd[s]=payload;renderPanel(s);updateTab(s);}catch(e){alert('שגיאה');}
}

async function copyLink(s){
  await navigator.clipboard.writeText(getLink(s));
  const b=document.getElementById('cpbtn'+s);b.textContent='✓ הועתק';b.classList.add('ok');
  setTimeout(()=>{b.textContent='העתק';b.classList.remove('ok')},2500);
}

function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pad(n){return String(n).padStart(2,'0')}
</script>
