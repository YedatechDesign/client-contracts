<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeda Contracts — ניהול הסכמים</title>
<style>
:root{--navy:#0d2680;--blue:#1a56db;--green:#059669;--red:#dc2626;--amber:#f59e0b;--bg:#f8fafc;--card:#fff;--bdr:#e5e7eb;--mu:#6b7280;--fa:#9ca3af;--rd:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#1f2937;direction:rtl;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:400px;width:100%}
.login-box .logo{font-family:'Arial Black',Arial,sans-serif;font-size:42px;color:var(--navy);font-weight:900}
.login-box .sub{color:var(--mu);font-size:13px;margin:8px 0 28px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;text-align:center;outline:none}
.login-box input:focus{border-color:var(--blue)}
.btn-login{width:100%;margin-top:14px;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-login:hover{background:var(--navy)}
.login-err{color:var(--rd);font-size:13px;margin-top:10px;display:none}
.header{background:var(--card);border-bottom:1px solid var(--bdr);padding:16px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header .logo{font-family:'Arial Black',Arial,sans-serif;font-size:22px;color:var(--navy);font-weight:900}
.header .title{font-size:15px;color:var(--mu)}
.spacer{flex:1}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--navy)}
.btn-secondary{background:#fff;border-color:var(--bdr);color:#374151}.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:var(--rd);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.filters{padding:16px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--card);color:var(--mu);transition:all .2s}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip:hover:not(.active){border-color:var(--blue);color:var(--blue)}
.counter{margin-right:auto;font-size:13px;color:var(--mu)}
.list-wrap{padding:0 28px 28px}
.contract-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px 22px;margin-bottom:12px;transition:box-shadow .2s}
.contract-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.badge.draft{background:#f3f4f6;color:#6b7280}.badge.sent{background:#eff6ff;color:#1a56db}.badge.signed{background:#ecfdf5;color:#059669}.badge.cancelled{background:#fef2f2;color:#dc2626}
.cc-title{font-size:15px;font-weight:700;flex:1}.cc-client{font-size:13px;color:var(--mu);margin-bottom:6px}
.cc-dates{font-size:12px;color:var(--fa);margin-bottom:10px}.cc-actions{display:flex;gap:8px;flex-wrap:wrap}
.editor-wrap{display:none}
.editor-header{background:var(--card);border-bottom:1px solid var(--bdr);padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.editor-body{padding:20px 28px;max-width:920px}
.acc{margin-bottom:12px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.acc-head{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;user-select:none}
.acc-head:hover{background:#f9fafb}
.acc-head .arrow{margin-right:auto;transition:transform .2s;font-size:12px;color:var(--mu)}
.acc.open .acc-head .arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:0 20px 18px}.acc.open .acc-body{display:block}
label{display:block;font-size:12px;font-weight:600;color:var(--mu);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input[type="text"],input[type="url"],textarea,select{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#fff}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:80px}
.inline-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.block-item{background:#f9fafb;border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.block-item .remove-btn{position:absolute;top:10px;left:10px;background:none;border:none;color:var(--rd);cursor:pointer;font-size:16px;opacity:.6}
.block-item .remove-btn:hover{opacity:1}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.client-logo-item{border:2px solid var(--bdr);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;position:relative}
.client-logo-item.selected{border-color:var(--blue);background:#eff6ff}
.client-logo-item img{width:80px;height:50px;object-fit:contain;display:block;margin:0 auto}
.client-logo-item .cname{font-size:11px;font-weight:600;color:#374151;margin-top:6px}
.client-logo-item .cdesc{font-size:9px;color:var(--mu);margin-top:2px;line-height:1.3}
.client-logo-item .del-client{position:absolute;top:4px;left:4px;background:var(--rd);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.client-logo-item:hover .del-client{display:flex}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:28px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-box h3{font-size:17px;color:var(--navy);margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.ver-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.ver-item:last-child{border-bottom:none}
.status-select{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;border:1.5px solid var(--bdr);background:#fff;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--mu);font-size:15px}
.spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-left:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.stitle{font-size:14px;font-weight:700;border:1px dashed #d4a017;border-radius:6px;padding:4px 8px;background:#fffbe6;display:inline-block;min-width:180px}
@media(max-width:640px){.header,.filters,.list-wrap,.editor-header,.editor-body{padding-right:16px;padding-left:16px}.inline-row{grid-template-columns:1fr}.btn-sm{padding:5px 8px;font-size:11px}}
</style>
</head>
<body>

<div id="loginView" class="login-wrap"><div class="login-box"><div class="logo">yeda</div><div class="sub">ניהול הסכמים דיגיטליים</div><input type="password" id="pwdInput" placeholder="סיסמה" autofocus><button class="btn-login" id="loginBtn">כניסה</button><div class="login-err" id="loginErr">סיסמה שגויה</div></div></div>

</div>

<div class="modal-overlay" id="addClientModal"><div class="modal-box"><h3>הוספת לקוח חדש</h3>
  <label>שם הלקוח *</label><input type="text" id="nc_name" placeholder="שם החברה">
  <label>תיאור קצר</label><input type="text" id="nc_desc" placeholder="תיאור קצר של החברה">
  <label>קישור לאתר</label><input type="url" id="nc_url" placeholder="https://example.com">
  <label>לוגו (PNG/JPG)</label><input type="file" id="nc_logo" accept="image/png,image/jpeg,image/webp" style="padding:8px">
  <p style="font-size:11px;color:var(--mu);margin-top:6px">הלוגו יש להעלות ידנית ל-GitHub Pages בנתיב logos/[id].png — מומלץ: PNG שקוף, 200×140px</p>
  <div class="modal-actions"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('addClientModal').classList.remove('show')">ביטול</button><button class="btn btn-primary btn-sm" id="btnAddClient">הוסף לקוח</button></div>
</div></div>

<div class="toast" id="toast"></div>

token_packages:[{amount:'10,000 טוקנים',original:'3,600₪',sale:'3,420₪',featured:false},{amount:'20,000 טוקנים',original:'7,200₪',sale:'6,480₪',featured:true},{amount:'40,000 טוקנים',original:'14,400₪',sale:'12,960₪',featured:false}],
token_examples:['*יצירת 10 סילבוסים = 20-40 טוקנים AI','*יצירת תוכן למצגות - 100 שקופיות = 20-25 טוקנים AI','*יצירת כתוביות לשעה של וידאו = 15-30 טוקנים AI','*יצירת שאלות לשעה של וידאו = 10-15 טוקנים AI','*חלוקה לפרקים לשעה של וידאו = 5-10 טוקנים AI','*תרגום כתוביות לשעה של וידאו = 80-130 טוקנים AI','יצירת לומדה מקבצים = 300-500 טוקנים AI','*3 שאלות לעוזר האישי = 1 טוקן AI'],
terms:[{id:'t1',title:'מערכת ניהול למידה',text:'הלקוח יקבל אתרים אישיים המוקמים על גבי פלטפורמת Yeda ומחוברים לדומיינים של הלקוח, בהתאם למבנה ולמספר האתרים שנרכשו. הפלטפורמה כוללת אתרים מלאים, מערכת ניהול למידה (LMS), אפשרות לחיבור מערכת תשלומים, עדכוני גרסה, תמיכה טכנית מלאה, קבוצת ווטסאפ ייעודית והדרכות. בהתאם להסכם, ההתקשרות היא בהתחייבות ללא אפשרות יציאה מוקדמת, והמחיר מפורט בהצעת המחיר. החבילה מאפשרת שימוש ללא הגבלת כמות משתמשים פעילים למשך שלוש שנות פעילות. בתום התקופה, המחיר עשוי להשתנות בהתאם להיקף השימוש בפועל.'},{id:'t2',title:'פלטפורמת AI ולומדות',text:'בנוסף, הלקוח יקבל גישה לפלטפורמה המיועדת לבנייה, עיצוב, הקלטה ואחסון של מצגות, וידאו, לומדות אינטראקטיביות ועוזרי למידה מבוססי AI. העלויות מפורטות בסיכום המחירים בהתאם לנפחי השימוש, וייתכנו חיובים נוספים במקרה של חריגה מהיקפי השימוש הכלולים בתקופת ההתקשרות.'},{id:'t3',title:'הגבלת אחריות',text:'חברת ידע פיתוח סביבות למידה בע"מ ו/או מי מטעמה אינם נושאים כל אחריות בקשר לכל תביעה משפטית או כל תלונה אחרת שהלקוח עלול לקבל בגין עבירה על חוקים ומגבלות הקשורים בדיני אינטרנט, לרבות הנושא נגישות, רישום דטאות, שמירה על פרטיות, חוק הספאם ועוד. מומלץ ללקוח להיוועץ בעו"ד המתמחה בתחום, על מנת להבטיח שלא תוגש כנגדו תלונה. השימוש באתר כפוף למדיניות פרטיות ותקנון תנאי שימוש בנוסחו מעת לעת.'},{id:'t4',title:'קניין רוחני',text:'מובהר כי הקניין הרוחני המלא של המוצרי תוכן באתר וזכויות היוצרים יהיו שייכים ללקוח.'},{id:'t5',title:'סודיות',text:'חברת ידע בע"מ מתחייבת לשמירה על סודיות וזכויות היוצרים - לא לשלוח ולשתף חומרים מתוך הקורסים או / ו דטאות משתמשים או / ו מידע הנחשף כלשהו וחומרים אחרים שאינם נחלת הכלל עם צד שלישי ללא רשותו של הלקוח.'}]};

function merge(def,ld){const o={};for(const k of Object.keys(def)){const v=ld[k];if(Array.isArray(def[k]))o[k]=(Array.isArray(v)&&v.length>0)?v:def[k];else if(typeof def[k]==='object'&&def[k]!==null)o[k]=(v&&typeof v==='object')?{...def[k],...v}:def[k];else o[k]=(v!==undefined&&v!==null&&v!=='')?v:def[k]}for(const k of Object.keys(ld)){if(!(k in o))o[k]=ld[k]}return o}
function gv(d,k){return(d[k]!==undefined&&d[k]!==null&&d[k]!=='')?d[k]:DEF[k]}
function ga(d,k){const v=d[k];return(Array.isArray(v)&&v.length>0)?v:DEF[k]}
function allCl(d){return{...DC,...(d?.custom_clients||{})}}
function st(d,k){return d?.section_titles?.[k]||ST_DEF[k]||''}

let password='',currentFilter='all',contracts=[],CC=null,CID=null;
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
function fmtD(iso){if(!iso)return'—';const d=new Date(iso);return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
async function api(u,b){return(await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}

function initLogin(){const s=sessionStorage.getItem('yeda_pwd');if(s===PASS){password=PASS;showApp();return}$('loginView').style.display='flex';$('loginBtn').onclick=()=>{const v=$('pwdInput').value.trim();if(v===PASS){password=v;sessionStorage.setItem('yeda_pwd',v);showApp()}else $('loginErr').style.display='block'};$('pwdInput').onkeydown=e=>{if(e.key==='Enter')$('loginBtn').click()}}
function showApp(){$('loginView').style.display='none';$('appView').style.display='block';loadList()}

async function loadList(){$('contractsList').innerHTML='<div class="loading"><div class="spinner"></div>טוען...</div>';try{const d=await api(N8N_LIST,{password,status_filter:currentFilter});contracts=d.contracts||[];renderList()}catch(e){$('contractsList').innerHTML='<div class="loading" style="color:var(--rd)">שגיאה</div>'}}
function renderList(){$('counter').textContent=`סה"כ: ${contracts.length} הסכמים`;if(!contracts.length){$('contractsList').innerHTML='<div class="loading" style="color:var(--mu)">אין הסכמים</div>';return}$('contractsList').innerHTML=contracts.map(c=>`<div class="contract-card"><div class="cc-top"><span class="badge ${c.status}">${STATUS_HE[c.status]||c.status}</span><span class="cc-title">${esc(c.title||'ללא כותרת')}</span></div><div class="cc-client">${esc(c.client_name||'—')}</div><div class="cc-dates">נוצר: ${fmtD(c.created_at)} · עודכן: ${fmtD(c.updated_at)}${c.signed_at?' · נחתם: '+fmtD(c.signed_at)+' ('+esc(c.signer_name||'')+')':''}</div><div class="cc-actions"><button class="btn btn-primary btn-sm" onclick="editC('${c.id}')">✏ ערוך</button><button class="btn btn-secondary btn-sm" onclick="cpLink('${c.id}','${c.token}')">📋 קישור</button><button class="btn btn-secondary btn-sm" onclick="window.open('${PROP_URL}?id=${c.id}&token=${c.token}','_blank')">👁 צפה</button><button class="btn btn-danger btn-sm" onclick="delC('${c.id}')">🗑</button></div></div>`).join('')}
document.querySelectorAll('.chip').forEach(ch=>{ch.onclick=()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));ch.classList.add('active');currentFilter=ch.dataset.f;loadList()}});
$('btnNew').onclick=async()=>{$('btnNew').disabled=true;try{const d=await api(N8N_CREATE,{password});toast('הסכם חדש נוצר');await loadList();editC(d.id)}catch(e){toast('שגיאה')}$('btnNew').disabled=false};
function cpLink(id,tk){navigator.clipboard.writeText(`${PROP_URL}?id=${id}&token=${tk}`).then(()=>toast('הקישור הועתק'))}
async function delC(id){if(!confirm('למחוק?'))return;try{await api(N8N_DELETE,{password,contract_id:id,drive_file_id:''});toast('נמחק');loadList()}catch(e){toast('שגיאה')}}

async function editC(id){$('listView').style.display='none';$('editorView').style.display='block';$('editorView').classList.add('editor-wrap');$('editorBody').innerHTML='<div class="loading"><div class="spinner"></div>טוען...</div>';CID=id;try{const r=await api(N8N_LOAD,{contract_id:id,mode:'admin'});const m=r._meta||{};delete r._meta;CC=merge(DEF,r);CC._meta=m;$('edStatusSelect').value=m.status||'draft';renderEd()}catch(e){$('editorBody').innerHTML='<div class="loading" style="color:var(--rd)">שגיאה</div>'}}
$('btnBack').onclick=()=>{$('editorView').style.display='none';$('listView').style.display='block';loadList()};
$('edStatusSelect').onchange=async()=>{try{await api(N8N_STATUS,{password,contract_id:CID,status:$('edStatusSelect').value});toast('סטטוס עודכן')}catch(e){toast('שגיאה')}};
$('btnSave').onclick=async()=>{collect();$('btnSave').disabled=true;try{await api(N8N_SAVE,{password,contract_id:CID,...CC});toast('נשמר')}catch(e){toast('שגיאה')}$('btnSave').disabled=false};
$('btnSaveVer').onclick=async()=>{collect();const vn=(CC.versions||[]).length+1;$('btnSaveVer').disabled=true;try{await api(N8N_SAVE,{password,contract_id:CID,...CC});await api(N8N_SAVE_VER,{password,contract_id:CID,version_number:vn,...CC});toast('גרסה נשמרה');editC(CID)}catch(e){toast('שגיאה')}$('btnSaveVer').disabled=false};
$('btnCopyLink').onclick=()=>cpLink(CID,CC?.token||CC?._meta?.token||'');

function stF(k,d){return`<input type="text" class="stitle" data-sk="${k}" value="${esc(st(d,k))}" onclick="event.stopPropagation()">`}
function renderEd(){const d=CC,cl=allCl(d),body=$('editorBody');
body.innerHTML=`
<div class="acc open"><div class="acc-head" onclick="tAcc(this)">📋 פרטי הסכם<span class="arrow">▾</span></div><div class="acc-body"><label>כותרת</label><input type="text" id="ed_title" value="${esc(gv(d,'title'))}"><label>שם לקוח</label><input type="text" id="ed_client_name" value="${esc(gv(d,'client_name'))}"></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">🎯 ${stF('matara',d)}<span class="arrow">▾</span></div><div class="acc-body"><textarea id="ed_matara" rows="4">${esc(gv(d,'matara'))}</textarea></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">🪜 ${stF('milestones',d)}<span class="arrow">▾</span></div><div class="acc-body"><div id="ed_ms">${ga(d,'milestones').map((m,i)=>msB(m,i)).join('')}</div><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addMs()">+ הוסף אבן דרך</button></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">💡 ${stF('why',d)}<span class="arrow">▾</span></div><div class="acc-body"><label>טקסט פתיחה (תומך &lt;b&gt; לבולד)</label><textarea id="ed_why_intro" rows="4">${esc(gv(d,'why_intro'))}</textarea><label>נקודות (שורה לכל נקודה)</label><textarea id="ed_why_items" rows="5">${ga(d,'why_items').join('\n')}</textarea></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">🏢 ${stF('clients',d)}<span class="arrow">▾</span></div><div class="acc-body">
<div class="clients-grid" id="ed_cl">${Object.entries(cl).map(([id,inf])=>`<div class="client-logo-item ${ga(d,'selected_clients').includes(id)?'selected':''}" data-cid="${id}" onclick="tCl(this)"><button class="del-client" onclick="event.stopPropagation();rmCl('${id}')" title="מחק">✕</button><img src="${LOGO_BASE}${id}.png" onerror="this.style.display='none'" alt="${esc(inf.name)}"><div class="cname">${esc(inf.name)}</div><div class="cdesc">${esc(inf.desc||'')}</div></div>`).join('')}</div>
<button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="document.getElementById('addClientModal').classList.add('show')">+ הוסף לקוח חדש</button></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">💰 ${stF('costs',d)}<span class="arrow">▾</span></div><div class="acc-body"><label>כותרת משנה</label><input type="text" id="ed_csub" value="${esc(gv(d,'costs_subtitle'))}"><label>שורות עלות (פריט | מחיר)</label><textarea id="ed_cr" rows="4">${ga(d,'costs_rows').map(r=>r.join(' | ')).join('\n')}</textarea><label style="margin-top:16px">תשלומים</label><div id="ed_pay">${ga(d,'payments').map((p,i)=>payB(p,i)).join('')}</div><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addPay()">+ הוסף תשלום</button></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">➕ ${stF('optional',d)}<span class="arrow">▾</span></div><div class="acc-body"><div id="ed_opt">${ga(d,'optional').map((o,i)=>optB(o,i)).join('')}</div><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addOpt()">+ הוסף שירות</button></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">🤖 ${stF('tokens',d)}<span class="arrow">▾</span></div><div class="acc-body"><div id="ed_tp">${ga(d,'token_packages').map((t,i)=>tpB(t,i)).join('')}</div><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addTp()">+ הוסף חבילה</button><label style="margin-top:16px">דוגמאות שימוש בטוקנים (שורה לכל דוגמה)</label><textarea id="ed_tex" rows="6">${ga(d,'token_examples').join('\n')}</textarea></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">📜 ${stF('terms',d)}<span class="arrow">▾</span></div><div class="acc-body"><div id="ed_trm">${ga(d,'terms').map((t,i)=>trmB(t,i)).join('')}</div><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addTrm()">+ הוסף תנאי</button></div></div>

<div class="acc"><div class="acc-head" onclick="tAcc(this)">🔗 קישור וגרסאות<span class="arrow">▾</span></div><div class="acc-body"><label>קישור ללקוח</label><div style="padding:8px;background:#f9fafb;border-radius:8px;font-size:13px;word-break:break-all">${PROP_URL}?id=${CID}&token=${d.token||d._meta?.token||''}</div><label style="margin-top:12px">גרסאות PDF</label><div>${(d.versions||d._meta?.versions||[]).length?(d.versions||d._meta?.versions||[]).map(v=>`<div class="ver-item"><span>${esc(v.name)}</span><span style="color:var(--fa)">${esc(v.date)}</span><a href="${v.url}" target="_blank" class="btn btn-secondary btn-sm">📄</a></div>`).join(''):'<span style="color:var(--fa);font-size:13px">אין גרסאות</span>'}</div></div></div>`}

function msB(m,i){return`<div class="block-item"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button><div class="inline-row"><div><label>מספר</label><input type="text" class="ms-n" value="${esc(m.num!==undefined?m.num:i)}" style="width:60px"></div><div><label>כותרת</label><input type="text" class="ms-t" value="${esc(m.title)}"></div></div><label>תיאור</label><textarea class="ms-d" rows="2">${esc(m.desc)}</textarea></div>`}
function payB(p){return`<div class="block-item"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button><div class="inline-row"><div><label>מספר</label><input type="text" class="p-n" value="${p.num}" style="width:60px"></div><div><label>כותרת</label><input type="text" class="p-t" value="${esc(p.title)}"></div></div><label>תיאור</label><textarea class="p-d" rows="2">${esc(p.desc)}</textarea><label>סה"כ</label><input type="text" class="p-tot" value="${esc(p.total)}"></div>`}
function optB(o){return`<div class="block-item"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button><div class="inline-row"><div><label>שירות</label><input type="text" class="o-t" value="${esc(o.title)}"></div><div><label>מחיר</label><input type="text" class="o-p" value="${esc(o.price)}"></div></div></div>`}
function tpB(t){return`<div class="block-item"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button><div class="inline-row"><div><label>כמות</label><input type="text" class="tp-a" value="${esc(t.amount)}"></div><div><label>מחיר מקורי</label><input type="text" class="tp-o" value="${esc(t.original)}"></div></div><div class="inline-row"><div><label>מחיר מבצע</label><input type="text" class="tp-s" value="${esc(t.sale)}"></div><div><label style="margin-top:24px"><input type="checkbox" class="tp-f" ${t.featured?'checked':''}> מודגש</label></div></div></div>`}
function trmB(t){return`<div class="block-item"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button><label>כותרת</label><input type="text" class="tr-t" value="${esc(t.title)}"><label>טקסט</label><textarea class="tr-x" rows="4">${esc(t.text)}</textarea></div>`}

function addMs(){const w=$('ed_ms'),n=w.querySelectorAll('.block-item').length;w.insertAdjacentHTML('beforeend',msB({num:String(n),title:'',desc:''},n))}
function addPay(){const w=$('ed_pay'),n=w.querySelectorAll('.block-item').length;w.insertAdjacentHTML('beforeend',payB({num:n+1,title:'',desc:'',total:''}))}
function addOpt(){$('ed_opt').insertAdjacentHTML('beforeend',optB({title:'',price:''}))}
function addTp(){$('ed_tp').insertAdjacentHTML('beforeend',tpB({amount:'',original:'',sale:'',featured:false}))}
function addTrm(){$('ed_trm').insertAdjacentHTML('beforeend',trmB({id:'',title:'',text:''}))}
function tCl(el){el.classList.toggle('selected')}
function tAcc(h){h.parentElement.classList.toggle('open')}

function rmCl(cid){if(!confirm('למחוק?'))return;if(CC.custom_clients?.[cid])delete CC.custom_clients[cid];CC.selected_clients=(CC.selected_clients||[]).filter(x=>x!==cid);renderEd();toast('לקוח הוסר')}

$('btnAddClient').onclick=()=>{const n=$('nc_name').value.trim();if(!n){alert('נא שם');return}const cid='c_'+Date.now().toString(36);if(!CC.custom_clients)CC.custom_clients={};CC.custom_clients[cid]={name:n,desc:$('nc_desc').value.trim(),url:$('nc_url').value.trim()};if(!Array.isArray(CC.selected_clients))CC.selected_clients=[...DEF.selected_clients];CC.selected_clients.push(cid);const f=$('nc_logo').files[0];if(f)toast(`העלו את הלוגו ידנית ל-GitHub: logos/${cid}.png`);$('addClientModal').classList.remove('show');renderEd();toast('לקוח נוסף: '+n)};

function collect(){const d=CC;d.title=$('ed_title').value;d.client_name=$('ed_client_name').value;d.matara=$('ed_matara').value;
d.section_titles={};document.querySelectorAll('.stitle').forEach(i=>{d.section_titles[i.dataset.sk]=i.value});
d.milestones=[...$('ed_ms').querySelectorAll('.block-item')].map((e,i)=>({id:'m'+i,num:e.querySelector('.ms-n').value,title:e.querySelector('.ms-t').value,desc:e.querySelector('.ms-d').value}));
d.why_intro=$('ed_why_intro').value;d.why_items=$('ed_why_items').value.split('\n').filter(x=>x.trim());
d.selected_clients=[...$('ed_cl').querySelectorAll('.client-logo-item.selected')].map(e=>e.dataset.cid);
d.costs_subtitle=$('ed_csub').value;d.costs_rows=$('ed_cr').value.split('\n').filter(x=>x.trim()).map(r=>{const p=r.split('|').map(s=>s.trim());return p.length>=2?p:[p[0],'']});
d.payments=[...$('ed_pay').querySelectorAll('.block-item')].map(e=>({num:parseInt(e.querySelector('.p-n').value)||1,title:e.querySelector('.p-t').value,desc:e.querySelector('.p-d').value,total:e.querySelector('.p-tot').value}));
d.optional=[...$('ed_opt').querySelectorAll('.block-item')].map(e=>({title:e.querySelector('.o-t').value,price:e.querySelector('.o-p').value}));
d.token_packages=[...$('ed_tp').querySelectorAll('.block-item')].map(e=>({amount:e.querySelector('.tp-a').value,original:e.querySelector('.tp-o').value,sale:e.querySelector('.tp-s').value,featured:e.querySelector('.tp-f').checked}));
d.token_examples=$('ed_tex').value.split('\n').filter(x=>x.trim());
d.terms=[...$('ed_trm').querySelectorAll('.block-item')].map((e,i)=>({id:'t'+(i+1),title:e.querySelector('.tr-t').value,text:e.querySelector('.tr-x').value}))}

initLogin();
</script>
</body>
</html>
