<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeda — ניהול הסכמים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d2680;--blue:#1a56db;--blue-light:#2563eb;--green:#059669;--red:#dc2626;--amber:#f59e0b;--bg:#f8fafc;--card:#fff;--bdr:#e5e7eb;--text:#1f2937;--muted:#6b7280;--faint:#9ca3af}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
/* ── LOGIN ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.login-box{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-logo{font-size:32pt;font-weight:900;color:var(--navy);letter-spacing:-2px;text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-family:inherit;outline:none;margin-bottom:14px;direction:rtl}
.login-box input:focus{border-color:var(--blue)}
.btn-primary{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-primary:hover{background:var(--navy)}
.login-err{color:var(--red);font-size:13px;text-align:center;display:none}
/* ── LAYOUT ── */
.app{display:none;min-height:100vh}
.topbar{background:var(--navy);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-logo{font-size:20pt;font-weight:900;letter-spacing:-1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:600;opacity:.8}
.btn-logout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
/* ── LIST VIEW ── */
.view-list,.view-editor{padding:28px;max-width:1100px;margin:0 auto}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.list-title{font-size:22px;font-weight:800;color:var(--navy)}
.btn-new{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .2s}
.btn-new:hover{background:var(--navy)}
/* Status filter chips */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.chip.active,.chip:hover{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.draft.active{background:#6b7280;border-color:#6b7280}
.chip.sent.active{background:var(--blue);border-color:var(--blue)}
.chip.signed.active{background:var(--green);border-color:var(--green)}
.chip.cancelled.active{background:var(--red);border-color:var(--red)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge.draft{background:#f3f4f6;color:#6b7280}
.badge.sent{background:#eff6ff;color:var(--blue)}
.badge.signed{background:#ecfdf5;color:var(--green)}
.badge.cancelled{background:#fef2f2;color:var(--red)}
/* Contract cards */
.contracts-grid{display:flex;flex-direction:column;gap:12px}
.contract-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:18px 22px;transition:box-shadow .2s,border-color .2s}
.contract-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(26,86,219,.08)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cc-title{font-size:16px;font-weight:800;color:var(--navy)}
.cc-client{font-size:14px;color:var(--muted);margin-bottom:6px}
.cc-dates{font-size:12px;color:var(--faint);display:flex;gap:16px}
.cc-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--bdr);background:#fff;color:var(--text);transition:all .2s}
.btn-sm:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.btn-sm.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-sm.primary:hover{background:var(--navy);border-color:var(--navy)}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted);font-size:15px}
.count-badge{background:#e0e7ff;color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;margin-right:8px}
/* ── EDITOR VIEW ── */
.editor-back{display:flex;align-items:center;gap:8px;color:var(--blue);cursor:pointer;font-weight:600;font-size:14px;margin-bottom:20px;width:fit-content}
.editor-back:hover{opacity:.7}
.editor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.editor-title-wrap{display:flex;align-items:center;gap:12px}
.editor-contract-title{font-size:20px;font-weight:800;color:var(--navy)}
.status-select{padding:6px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;outline:none}
.editor-actions{display:flex;gap:8px;flex-wrap:wrap}
.acc{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;margin-bottom:12px;overflow:hidden}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;font-weight:700;color:var(--navy)}
.acc-head:hover{background:#f8fafc}
.acc-ico{margin-left:8px}
.acc-arr{font-size:12px;transition:transform .2s;color:var(--muted)}
.acc.open .acc-arr{transform:rotate(180deg)}
.acc-body{display:none;padding:18px;border-top:1px solid var(--bdr)}
.acc.open .acc-body{display:block}
/* Form elements */
.fl{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;margin-top:12px}
.fl:first-child{margin-top:0}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;outline:none;direction:rtl}
.fi:focus{border-color:var(--blue)}
textarea.fi{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-add{background:#eff6ff;border:1.5px dashed var(--blue);color:var(--blue);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;transition:all .2s}
.btn-add:hover{background:var(--blue);color:#fff}
.bl-card{background:#f8fafc;border:1.5px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:10px}
.bl-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bl-num{width:30px;height:30px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.bl-ti{flex:1}
.bdel{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;flex-shrink:0}
.bdel:hover{color:var(--red)}
.bl-tx{width:100%;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px;direction:rtl;outline:none}
.bl-tx:focus{border-color:var(--blue)}
/* Client grid */
.cl-sel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
@media(max-width:768px){.cl-sel-grid{grid-template-columns:repeat(2,1fr)}}
.cc-item{border:1.5px solid var(--bdr);border-radius:10px;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;background:#fff}
.cc-item.sel{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.cc-item:hover{border-color:var(--blue)}
/* Cost/payments */
.tbl-row{display:grid;grid-template-columns:1fr 1fr 30px;gap:8px;align-items:center;margin-bottom:8px}
.pay-row{background:#f8fafc;border:1.5px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:10px}
.pay-rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:700;color:var(--navy);font-size:14px}
.tok-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.why-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.why-row .fi{flex:1}
/* Version list */
.ver-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ver-item{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border:1px solid var(--bdr);border-radius:8px;padding:10px 14px}
.ver-name{font-size:13px;font-weight:600}
.ver-date{font-size:11px;color:var(--muted)}
.link-display{font-size:12px;word-break:break-all;color:var(--blue);padding:10px 14px;background:#eff6ff;border-radius:8px;margin:10px 0;border:1px solid #dbeafe}
.save-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}
.save-msg{font-size:13px;font-weight:600}
.save-msg.ok{color:var(--green)}
.save-msg.err{color:var(--red)}
.spinner-sm{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.signed-notice{background:#ecfdf5;border:2px solid var(--green);border-radius:10px;padding:14px 18px;margin-bottom:16px;color:var(--green);font-weight:700;font-size:14px}
/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted)}
.loading-spin{width:40px;height:40px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
</style>
</head>
<body>

<!-- ── LOGIN ────────────────────────────────────────────────────── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">yeda</div>
    <div class="login-sub">ניהול הסכמים</div>
    <input type="password" id="pwInput" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">כניסה</button>
    <div class="login-err" id="loginErr">סיסמה שגויה</div>
  </div>
</div>

<!-- ── APP ──────────────────────────────────────────────────────── -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">yeda</div>
    <div class="topbar-right">
      <div class="topbar-title">ניהול הסכמים</div>
      <button class="btn-logout" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="view-list" id="viewList">
    <div class="list-header">
      <div class="list-title">📄 הסכמים <span class="count-badge" id="countBadge">0</span></div>
      <button class="btn-new" onclick="createNew()">➕ הסכם חדש</button>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="chip active" data-filter="all" onclick="setFilter('all',this)">הכל</button>
      <button class="chip draft" data-filter="draft" onclick="setFilter('draft',this)">טיוטה</button>
      <button class="chip sent" data-filter="sent" onclick="setFilter('sent',this)">נשלח</button>
      <button class="chip signed" data-filter="signed" onclick="setFilter('signed',this)">נחתם ✓</button>
      <button class="chip cancelled" data-filter="cancelled" onclick="setFilter('cancelled',this)">בוטל</button>
    </div>
    <div id="contractsList"><div class="loading"><div class="loading-spin"></div>טוען הסכמים...</div></div>
  </div>

  <!-- EDITOR -->
  <div class="view-editor" id="viewEditor" style="display:none">
    <div class="editor-back" onclick="backToList()">← חזור לרשימה</div>
    <div class="editor-top">
      <div class="editor-title-wrap">
        <div class="editor-contract-title" id="editorTitle">הסכם</div>
        <select class="status-select" id="statusSelect" onchange="changeStatus()">
          <option value="draft">טיוטה</option>
          <option value="sent">נשלח</option>
          <option value="signed">נחתם ✓</option>
          <option value="cancelled">בוטל</option>
        </select>
      </div>
      <div class="editor-actions">
        <button class="btn-sm" onclick="copyLink()">🔗 העתק קישור</button>
        <button class="btn-sm" onclick="saveVersion()" id="vbtn"><span class="spinner-sm" id="vsp"></span><span id="vtxt">📄 שמור גרסה</span></button>
        <button class="btn-sm primary" onclick="saveContract()" id="sbtn"><span class="spinner-sm" id="ssp"></span><span id="stxt">💾 שמור</span></button>
      </div>
    </div>
    <div id="saveMsg" class="save-msg" style="margin-bottom:12px"></div>
    <div id="editorPanels"></div>
  </div>
</div>

<script>
const PASS='yedacontracts2026';
const N8N='https://yedauto.com/webhook';
const PROP_URL='https://yedatechdesign.github.io/client-contracts/proposal.html';
const LOGOS='https://yedatechdesign.github.io/client-contracts/logos/';
const ALL_CLIENTS=[
  {id:'client1',name:'HackerU'},{id:'client2',name:'מכללת IPC'},{id:'client3',name:'מכללת אורין שפלטר'},
  {id:'client4',name:'ThriveDX'},{id:'client5',name:'מרכז גומא גבים'},{id:'client6',name:'מכללת קול המס'},
  {id:'client7',name:'HIGHQ'},{id:'client8',name:'פירמת עורכי הדין פישר'},{id:'client9',name:'קבוצת מובמנט'},
  {id:'client10',name:'אולג׳ובס'},{id:'client11',name:'מלם טים'},{id:'client12',name:'כלכליסט'}
];

let pw='', curFilter='all', curContract=null, contracts=[];
const pad=n=>String(n).padStart(2,'0');
const h=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── AUTH ──────────────────────────────────────────────────────────
function doLogin(){
  const v=document.getElementById('pwInput').value;
  if(v!==PASS){document.getElementById('loginErr').style.display='block';return;}
  pw=v;
  sessionStorage.setItem('ypw',pw);
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  loadList();
}
function doLogout(){
  sessionStorage.removeItem('ypw');
  location.reload();
}
(function(){
  const saved=sessionStorage.getItem('ypw');
  if(saved===PASS){
    pw=saved;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').style.display='block';
    loadList();
  }
})();

// ── STATUS LABEL/COLOR ────────────────────────────────────────────
function statusLabel(s){return{draft:'טיוטה',sent:'נשלח',signed:'נחתם ✓',cancelled:'בוטל'}[s]||s;}
function statusBadge(s){return`<span class="badge ${s}">${statusLabel(s)}</span>`;}

// ── FORMAT DATE ───────────────────────────────────────────────────
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso);return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();}

// ── LOAD LIST ─────────────────────────────────────────────────────
async function loadList(filter){
  filter=filter||curFilter;
  document.getElementById('contractsList').innerHTML='<div class="loading"><div class="loading-spin"></div>טוען...</div>';
  try{
    const r=await fetch(N8N+'/yeda-contracts-list',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw,status_filter:filter})});
    const data=await r.json();
    contracts=Array.isArray(data.contracts)?data.contracts:(Array.isArray(data)?data:[]);
    renderList();
  }catch(e){
    document.getElementById('contractsList').innerHTML='<div class="empty-state">שגיאה בטעינה. בדוק חיבור.</div>';
  }
}

function renderList(){
  document.getElementById('countBadge').textContent=contracts.length;
  const el=document.getElementById('contractsList');
  if(!contracts.length){el.innerHTML='<div class="empty-state">אין הסכמים</div>';return;}
  el.innerHTML='<div class="contracts-grid">'+contracts.map(c=>`
    <div class="contract-card">
      <div class="cc-top">
        <div>
          <div class="cc-title">${h(c.title||'ללא כותרת')}</div>
          <div class="cc-client">${h(c.client_name||'לא הוגדר לקוח')}</div>
        </div>
        ${statusBadge(c.status||'draft')}
      </div>
      <div class="cc-dates">
        <span>נוצר: ${fmtDate(c.created_at)}</span>
        <span>עודכן: ${fmtDate(c.updated_at)}</span>
        ${c.signed_at?`<span>נחתם: ${fmtDate(c.signed_at)}</span>`:''}
      </div>
      <div class="cc-actions">
        <button class="btn-sm primary" onclick="openEditor('${c.id}')">✏ ערוך</button>
        <button class="btn-sm" onclick="copyContractLink('${c.id}','${c.token||''}')">🔗 העתק קישור</button>
        ${c.signed_pdf_url?`<button class="btn-sm" onclick="window.open('${c.signed_pdf_url}','_blank')">📄 PDF חתום</button>`:''}
        <button class="btn-sm danger" onclick="deleteContract('${c.id}')">🗑 מחק</button>
      </div>
    </div>`).join('')+'</div>';
}

function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  loadList(f);
}

// ── CREATE ────────────────────────────────────────────────────────
async function createNew(){
  const title=prompt('כותרת הצעה:','הצעת מחיר – פיתוח מערכת מותאמת אישית');
  if(!title)return;
  const client=prompt('שם הלקוח (ניתן לשנות מאוחר יותר):','');
  try{
    const r=await fetch(N8N+'/yeda-contract-create',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
  password: pw,
  contract_id: id
})
    const data=await r.json();
    if(data.id){
      await loadList();
      openEditor(data.id);
    }
  }catch(e){alert('שגיאה ביצירת הסכם');}
}

// ── DELETE ────────────────────────────────────────────────────────
async function deleteContract(id){
  if(!confirm('למחוק הסכם זה לצמיתות?'))return;
  const c=contracts.find(x=>x.id===id);
  try{
    await fetch(N8N+'/yeda-contract-delete',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw,contract_id:id,drive_file_id:c?.slot_drive_file_id||''})});
    loadList();
  }catch(e){alert('שגיאה במחיקה');}
}

function copyContractLink(id,token){
  const url=PROP_URL+'?id='+id+(token?'&token='+token:'');
  navigator.clipboard.writeText(url).then(()=>alert('הקישור הועתק!')).catch(()=>prompt('העתק:',url));
}

// ── OPEN EDITOR ───────────────────────────────────────────────────
async function openEditor(id){
  document.getElementById('viewList').style.display='none';
  document.getElementById('viewEditor').style.display='block';
  document.getElementById('editorPanels').innerHTML='<div class="loading"><div class="loading-spin"></div>טוען הסכם...</div>';
  try{
    const r=await fetch(N8N+'/yeda-contract-load',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
  password: pw,
  contract_id: id
})});
    const raw=await r.json();
    curContract=mergeDefaults(raw);
    renderEditor();
  }catch(e){
    document.getElementById('editorPanels').innerHTML='<div class="empty-state">שגיאה בטעינה</div>';
  }
}

function backToList(){
  document.getElementById('viewEditor').style.display='none';
  document.getElementById('viewList').style.display='block';
  curContract=null;
  loadList();
}

// ── DEFAULTS ──────────────────────────────────────────────────────
const DD={
  title:'הצעת מחיר – פיתוח מערכת מותאמת אישית',client_name:'',
  matara:'פיתוח מערכת מותאמת אישית ליצירת תכנים עם AI לפי אפיון מאושר מראש, הקמת אתר לניהול למידה ומעקב ביצועים תחת מערכת Yeda. המערכת תאפשר ניהול תהליכי למידה ומעקב אחר התקדמות ההכשרות, כולל רישום, צפייה בתכנים, ומדידה של התקדמות המשתתפים לאורך זמן.',

function mergeDefaults(loaded){
  const out={};
  for(const k of Object.keys(DD)){
    const lv=loaded[k];
    if(Array.isArray(DD[k])) out[k]=(Array.isArray(lv)&&lv.length>0)?lv:DD[k];
    else out[k]=(lv!==undefined&&lv!==null&&lv!=='')?lv:DD[k];
  }
  for(const k of Object.keys(loaded)){if(!(k in out))out[k]=loaded[k];}
  return out;
}

function acc(id,icon,title,body,open=false){
  return `<div class="acc${open?' open':''}" id="ac-${id}">
    <div class="acc-head" onclick="document.getElementById('ac-${id}').classList.toggle('open')">

    </div>
    <div class="acc-body">${body}</div>
  </div>`;
}

// ── GETTERS ───────────────────────────────────────────────────────
function getMs(){return [...document.querySelectorAll('[id^="ms-"]')].filter(e=>e.classList.contains('bl-card')).map(el=>{const id=el.id.slice(3);return{id,num:document.getElementById('mst-'+id)?[...document.getElementById('msList').children].indexOf(el)+'':id,title:document.getElementById('mst-'+id)?.value||'',desc:document.getElementById('msd-'+id)?.value||''}});}
function getWhy(){return[...document.querySelectorAll('[id^="wi-"]')].map(e=>e.value).filter(Boolean);}
function getClients(){return ALL_CLIENTS.map(c=>c.id).filter(id=>document.getElementById('cc-'+id)?.classList.contains('sel'));}
function getCosts(){return[...document.querySelectorAll('[id^="cr-"]')].filter(e=>e.id.endsWith('-0')).map(e=>{const i=e.id.split('-')[1];return[document.getElementById('cr-'+i+'-0')?.value||'',document.getElementById('cr-'+i+'-1')?.value||'']});}
function getPayments(){return[...document.querySelectorAll('[id^="pay-"]')].filter(e=>e.classList.contains('pay-row')).map((e,i)=>{const idx=e.id.split('-')[1];return{num:i+1,title:document.getElementById('pt-'+idx)?.value||'',desc:document.getElementById('pd-'+idx)?.value||'',total:document.getElementById('pp-'+idx)?.value||''}});}
function getOpts(){return[...document.querySelectorAll('[id^="op-"]')].filter(e=>e.id.endsWith('-t')).map(e=>{const i=e.id.split('-')[1];return{title:document.getElementById('op-'+i+'-t')?.value||'',price:document.getElementById('op-'+i+'-p')?.value||''}});}
function getTokPkgs(){return[...document.querySelectorAll('[id^="tp-"]')].filter(e=>e.id.endsWith('-a')).map(e=>{const i=e.id.split('-')[1];return{amount:document.getElementById('tp-'+i+'-a')?.value||'',original:document.getElementById('tp-'+i+'-o')?.value||'',sale:document.getElementById('tp-'+i+'-s')?.value||''}});}
function getTokEx(){return[...document.querySelectorAll('[id^="te-"]')].map(e=>e.value).filter(Boolean);}
function getTerms(){return[...document.querySelectorAll('[id^="trm-"]')].filter(e=>e.classList.contains('bl-card')).map(e=>{const id=e.id.slice(4);return{id,title:document.getElementById('trt-'+id)?.value||'',text:document.getElementById('trb-'+id)?.value||''}});}

function buildPayload(){
  return{
    ...curContract,
    password:pw,
    title:document.getElementById('e-title')?.value||curContract.title,
    client_name:document.getElementById('e-cname')?.value||curContract.client_name,
    matara:document.getElementById('e-matara')?.value||curContract.matara,
    milestones:getMs(),why_intro:document.getElementById('e-whyintro')?.value||curContract.why_intro,
    why_items:getWhy(),selected_clients:getClients(),

    costs_rows:getCosts(),payments:getPayments(),optional:getOpts(),
    token_packages:getTokPkgs(),token_examples:getTokEx(),terms:getTerms()
  };
}

// ── SAVE ──────────────────────────────────────────────────────────
async function saveContract(){
  const btn=document.getElementById('sbtn'),sp=document.getElementById('ssp'),tx=document.getElementById('stxt'),msg=document.getElementById('saveMsg');
  btn.disabled=true;sp.style.display='inline-block';tx.textContent='שומר...';
  const payload=buildPayload();
  try{
    const r=await fetch(N8N+'/yeda-contract-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('שגיאה '+r.status);
    curContract=payload;
    document.getElementById('editorTitle').textContent=payload.title||'הסכם';
    msg.textContent='✓ נשמר';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',3000);
  }catch(e){msg.textContent='שגיאה: '+e.message;msg.className='save-msg err';}
  btn.disabled=false;sp.style.display='none';tx.textContent='💾 שמור';
}

// ── STATUS CHANGE ─────────────────────────────────────────────────
async function changeStatus(){
  const newStatus=document.getElementById('statusSelect').value;
  if(!curContract?.contract_id)return;
  try{
    await fetch(N8N+'/yeda-status-update',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw,contract_id:curContract.contract_id,status:newStatus})});
    curContract.status=newStatus;
  }catch(e){}
}

// ── LINK ──────────────────────────────────────────────────────────
function copyLink(){
  if(!curContract)return;
  const url=PROP_URL+'?id='+curContract.contract_id+(curContract.token?'&token='+curContract.token:'');
  navigator.clipboard.writeText(url).then(()=>{
    const msg=document.getElementById('saveMsg');
    msg.textContent='✓ קישור הועתק';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',2000);
  }).catch(()=>prompt('העתק:',url));
  // Auto set status to 'sent' if draft
  if(curContract.status==='draft'){
    document.getElementById('statusSelect').value='sent';
    changeStatus();
  }
}

async function refreshToken(){
  if(!confirm('צור קישור חדש? הקישור הישן יפסיק לעבוד.'))return;
  const newToken=Math.random().toString(36).slice(2,10)+Date.now().toString(36);
  curContract.token=newToken;
  await saveContract();
  const link=PROP_URL+'?id='+curContract.contract_id+'&token='+newToken;
  document.getElementById('linkDisp').textContent=link;
}
