function showApp(){$('loginView').style.display='none';$('appView').style.display='block';loadList()}
async function loadList(){$('contractsList').innerHTML='<div class="ld"><div class="spn"></div>טוען...</div>';try{const d=await api(EP.list,{password:pw,status_filter:cf});cts=d.contracts||[];renderList()}catch(e){$('contractsList').innerHTML='<div class="ld" style="color:var(--rd)">שגיאה</div>'}}
function renderList(){$('counter').textContent=`סה"כ: ${cts.length}`;if(!cts.length){$('contractsList').innerHTML='<div class="ld" style="color:var(--mu)">אין הסכמים</div>';return}$('contractsList').innerHTML=cts.map(c=>`<div class="cc"><div class="cct"><span class="badge ${c.status}">${SH[c.status]||c.status}</span><span class="ccttl">${esc(c.title||'ללא כותרת')}</span></div><div class="cccl">${esc(c.client_name||'—')}</div><div class="ccdt">נוצר: ${fd(c.created_at)} · עודכן: ${fd(c.updated_at)}</div><div class="ccac"><button class="btn bp bsm" onclick="editC('${c.id}')">✏ ערוך</button><button class="btn bs bsm" onclick="cpL('${c.id}','${c.token}')">📋</button><button class="btn bs bsm" onclick="window.open('${PURL}?id=${c.id}&token=${c.token}','_blank')">👁</button><button class="btn bd bsm" onclick="delC('${c.id}')">🗑</button></div></div>`).join('')}
document.querySelectorAll('.chip').forEach(ch=>{ch.onclick=()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));ch.classList.add('active');cf=ch.dataset.f;loadList()}});
$('btnNew').onclick=async()=>{$('btnNew').disabled=true;try{const d=await api(EP.create,{password:pw});toast('נוצר');await loadList();editC(d.id)}catch(e){toast('שגיאה')}$('btnNew').disabled=false};
function cpL(id,tk){navigator.clipboard.writeText(`${PURL}?id=${id}&token=${tk}`).then(()=>toast('הועתק'))}
async function delC(id){if(!confirm('למחוק?'))return;try{await api(EP.del,{password:pw,contract_id:id,drive_file_id:''});toast('נמחק');loadList()}catch(e){toast('שגיאה')}}
async function editC(id){$('listView').style.display='none';$('editorView').style.display='block';$('editorView').classList.add('ew');$('editorBody').innerHTML='<div class="ld"><div class="spn"></div>טוען...</div>';CID=id;try{const r=await api(EP.load,{contract_id:id,mode:'admin'});const m=r._meta||{};delete r._meta;CC=mg(DEF,r);CC._meta=m;$('edSt').value=m.status||'draft';renderEd()}catch(e){$('editorBody').innerHTML='<div class="ld" style="color:var(--rd)">שגיאה</div>'}}
$('btnBack').onclick=()=>{$('editorView').style.display='none';$('listView').style.display='block';loadList()};
$('edSt').onchange=async()=>{try{await api(EP.status,{password:pw,contract_id:CID,status:$('edSt').value});toast('עודכן')}catch(e){toast('שגיאה')}};
/* ISSUE 1 FIX: Save collects data, sends to n8n save endpoint which updates Drive JSON, does NOT reload */
$('btnSave').onclick=async()=>{collect();$('btnSave').disabled=true;try{const r=await api(EP.save,{password:pw,contract_id:CID,...CC});if(r.success)toast('נשמר ✓');else toast('שגיאה: '+(r.error||'unknown'))}catch(e){toast('שגיאה בשמירה')}$('btnSave').disabled=false};
$('btnSaveVer').onclick=async()=>{collect();$('btnSaveVer').disabled=true;try{await api(EP.save,{password:pw,contract_id:CID,...CC});const vn=(CC.versions||[]).length+1;const res=await api(EP.ver,{password:pw,contract_id:CID,version_number:vn,...CC});toast('גרסה '+vn+' נשמרה ✓')}catch(e){toast('שגיאה')}$('btnSaveVer').disabled=false};
$('btnCopyLink').onclick=()=>cpL(CID,CC?.token||CC?._meta?.token||'');
function sf(k,d){const v=d?.section_titles?.[k]||ST0[k]||'';return`<input type="text" class="sti" data-sk="${k}" value="${esc(v)}" onclick="event.stopPropagation()">`}
function renderEd(){const d=CC;$('editorBody').innerHTML=`
<div class="acc open"><div class="ach" onclick="tA(this)">📋 פרטי הסכם<span class="ar">▾</span></div><div class="acb"><label>כותרת</label><input type="text" id="ed_title" value="${esc(gv(d,'title'))}"><label>שם לקוח</label><input type="text" id="ed_cn" value="${esc(gv(d,'client_name'))}"></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">🎯 ${sf('matara',d)}<span class="ar">▾</span></div><div class="acb"><textarea id="ed_mat" rows="5">${esc(gv(d,'matara'))}</textarea></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">🪜 ${sf('milestones',d)}<span class="ar">▾</span></div><div class="acb"><div id="ed_ms">${ga(d,'milestones').map((m,i)=>msB(m,i)).join('')}</div><button class="btn bs bsm" style="margin-top:8px" onclick="addMs()">+ אבן דרך</button></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">💡 ${sf('why',d)}<span class="ar">▾</span></div><div class="acb"><label>טקסט פתיחה</label><textarea id="ed_wi" rows="5">${esc(gv(d,'why_intro'))}</textarea><label>נקודות</label><textarea id="ed_wl" rows="5">${ga(d,'why_items').join('\n')}</textarea></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">🏢 ${sf('clients',d)}<span class="ar">▾</span></div><div class="acb"><div class="clg" id="ed_cl">${Object.entries(DC).map(([id,inf])=>`<div class="cli ${ga(d,'selected_clients').includes(id)?'selected':''}" data-cid="${id}" onclick="this.classList.toggle('selected')"><img src="${LB}${id}.png" onerror="this.style.display='none'" alt="${esc(inf.name)}"><div class="cn">${esc(inf.name)}</div></div>`).join('')}</div></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">💰 ${sf('costs',d)}<span class="ar">▾</span></div><div class="acb"><label>כותרת</label><input type="text" id="ed_csub" value="${esc(gv(d,'costs_subtitle'))}"><label>עלויות (פריט | מחיר)</label><textarea id="ed_cr" rows="4">${ga(d,'costs_rows').map(r=>r.join(' | ')).join('\n')}</textarea><label>תשלומים</label><div id="ed_pay">${ga(d,'payments').map(p=>payB(p)).join('')}</div><button class="btn bs bsm" style="margin-top:8px" onclick="addPay()">+ תשלום</button></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">➕ ${sf('optional',d)}<span class="ar">▾</span></div><div class="acb"><div id="ed_opt">${ga(d,'optional').map(o=>optB(o)).join('')}</div><button class="btn bs bsm" style="margin-top:8px" onclick="addOpt()">+ שירות</button></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">🤖 ${sf('tokens',d)}<span class="ar">▾</span></div><div class="acb"><div id="ed_tp">${ga(d,'token_packages').map(t=>tpB(t)).join('')}</div><button class="btn bs bsm" style="margin-top:8px" onclick="addTp()">+ חבילה</button><label>דוגמאות</label><textarea id="ed_tex" rows="6">${ga(d,'token_examples').join('\n')}</textarea></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">📜 ${sf('terms',d)}<span class="ar">▾</span></div><div class="acb"><div id="ed_trm">${ga(d,'terms').map(t=>trmB(t)).join('')}</div><button class="btn bs bsm" style="margin-top:8px" onclick="addTrm()">+ תנאי</button></div></div>
<div class="acc"><div class="ach" onclick="tA(this)">🔗 קישור<span class="ar">▾</span></div><div class="acb"><div style="padding:8px;background:#f9fafb;border-radius:8px;font-size:13px;word-break:break-all">${PURL}?id=${CID}&token=${d.token||d._meta?.token||''}</div></div></div>`}
function msB(m,i){return`<div class="bi"><button class="rb" onclick="this.parentElement.remove()">✕</button><div class="ir"><div><label>מספר</label><input type="text" class="ms-n" value="${esc(m.num!==undefined?m.num:i)}" style="width:60px"></div><div><label>כותרת</label><input type="text" class="ms-t" value="${esc(m.title)}"></div></div><label>תיאור</label><textarea class="ms-d" rows="2">${esc(m.desc)}</textarea></div>`}
function payB(p){return`<div class="bi"><button class="rb" onclick="this.parentElement.remove()">✕</button><div class="ir"><div><label>#</label><input type="text" class="p-n" value="${p.num}" style="width:60px"></div><div><label>כותרת</label><input type="text" class="p-t" value="${esc(p.title)}"></div></div><label>תיאור</label><textarea class="p-d" rows="2">${esc(p.desc)}</textarea><label>סה"כ</label><input type="text" class="p-tot" value="${esc(p.total)}"></div>`}
function optB(o){return`<div class="bi"><button class="rb" onclick="this.parentElement.remove()">✕</button><div class="ir"><div><label>שירות</label><input type="text" class="o-t" value="${esc(o.title)}"></div><div><label>מחיר</label><input type="text" class="o-p" value="${esc(o.price)}"></div></div></div>`}
function tpB(t){return`<div class="bi"><button class="rb" onclick="this.parentElement.remove()">✕</button><div class="ir"><div><label>כמות</label><input type="text" class="tp-a" value="${esc(t.amount)}"></div><div><label>מקורי</label><input type="text" class="tp-o" value="${esc(t.original)}"></div></div><div class="ir"><div><label>מבצע</label><input type="text" class="tp-s" value="${esc(t.sale)}"></div><div><label style="margin-top:24px"><input type="checkbox" class="tp-f" ${t.featured?'checked':''}> מודגש</label></div></div></div>`}
function trmB(t){return`<div class="bi"><button class="rb" onclick="this.parentElement.remove()">✕</button><label>כותרת</label><input type="text" class="tr-t" value="${esc(t.title)}"><label>טקסט</label><textarea class="tr-x" rows="4">${esc(t.text)}</textarea></div>`}
function addMs(){const w=$('ed_ms'),n=w.querySelectorAll('.bi').length;w.insertAdjacentHTML('beforeend',msB({num:String(n),title:'',desc:''},n))}
function addPay(){const w=$('ed_pay'),n=w.querySelectorAll('.bi').length;w.insertAdjacentHTML('beforeend',payB({num:n+1,title:'',desc:'',total:''}))}
function addOpt(){$('ed_opt').insertAdjacentHTML('beforeend',optB({title:'',price:''}))}
function addTp(){$('ed_tp').insertAdjacentHTML('beforeend',tpB({amount:'',original:'',sale:'',featured:false}))}
function addTrm(){$('ed_trm').insertAdjacentHTML('beforeend',trmB({id:'',title:'',text:''}))}
function tA(h){h.parentElement.classList.toggle('open')}
function collect(){const d=CC;d.title=$('ed_title').value;d.client_name=$('ed_cn').value;d.matara=$('ed_mat').value;
d.section_titles={};document.querySelectorAll('.sti').forEach(i=>{d.section_titles[i.dataset.sk]=i.value});
d.milestones=[...$('ed_ms').querySelectorAll('.bi')].map((e,i)=>({id:'m'+i,num:e.querySelector('.ms-n').value,title:e.querySelector('.ms-t').value,desc:e.querySelector('.ms-d').value}));
d.why_intro=$('ed_wi').value;d.why_items=$('ed_wl').value.split('\n').filter(x=>x.trim());
d.selected_clients=[...$('ed_cl').querySelectorAll('.cli.selected')].map(e=>e.dataset.cid);
d.costs_subtitle=$('ed_csub').value;d.costs_rows=$('ed_cr').value.split('\n').filter(x=>x.trim()).map(r=>{const p=r.split('|').map(s=>s.trim());return p.length>=2?p:[p[0],'']});
d.payments=[...$('ed_pay').querySelectorAll('.bi')].map(e=>({num:parseInt(e.querySelector('.p-n').value)||1,title:e.querySelector('.p-t').value,desc:e.querySelector('.p-d').value,total:e.querySelector('.p-tot').value}));
d.optional=[...$('ed_opt').querySelectorAll('.bi')].map(e=>({title:e.querySelector('.o-t').value,price:e.querySelector('.o-p').value}));
d.token_packages=[...$('ed_tp').querySelectorAll('.bi')].map(e=>({amount:e.querySelector('.tp-a').value,original:e.querySelector('.tp-o').value,sale:e.querySelector('.tp-s').value,featured:e.querySelector('.tp-f').checked}));
d.token_examples=$('ed_tex').value.split('\n').filter(x=>x.trim());
d.terms=[...$('ed_trm').querySelectorAll('.bi')].map((e,i)=>({id:'t'+(i+1),title:e.querySelector('.tr-t').value,text:e.querySelector('.tr-x').value}))}
initLogin();
</script>
</body>
</html>
