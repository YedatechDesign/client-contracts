<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>yeda — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d2680;--blue:#1a56db;--bl:#e8f0fe;--bm:#c7d7fc;
  --sub:#374151;--mu:#6b7280;--fa:#9ca3af;--bg:#f4f6fb;
  --white:#fff;--bdr:#e5e7eb;--gr:#059669;--rd:#dc2626;--r:12px;--sh:0 2px 8px rgba(0,0,0,.07)}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--sub);direction:rtl}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lbox{background:#fff;border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);
      padding:48px 40px;max-width:380px;width:100%;text-align:center}
.llogo{font-size:2.2rem;font-weight:900;color:var(--navy);letter-spacing:-2px;margin-bottom:6px}
.lsub{color:var(--mu);font-size:.85rem;margin-bottom:30px}
.linp{width:100%;border:1.5px solid var(--bdr);border-radius:9px;padding:12px 14px;
      font-family:'Heebo',sans-serif;font-size:.95rem;direction:ltr;text-align:center;
      margin-bottom:12px;transition:border-color .2s}
.linp:focus{outline:none;border-color:var(--blue)}
.lbtn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
.lbtn:hover{background:var(--navy)}
.lerr{color:var(--rd);font-size:.8rem;margin-top:8px;display:none}

/* APP */
#app{display:none}
.topbar{background:#fff;border-bottom:1px solid var(--bdr);height:56px;
        display:flex;align-items:center;justify-content:space-between;padding:0 24px;
        position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tlogo{font-size:1.4rem;font-weight:900;color:var(--navy);letter-spacing:-1.5px}
.tabs{display:flex;gap:6px}
.tab{padding:7px 16px;background:none;border:1.5px solid var(--bdr);border-radius:8px;
     font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--mu);transition:all .15s}
.tab:hover{border-color:var(--bm);color:var(--blue)}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab .sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-left:5px;vertical-align:middle}
.lout{background:none;border:1px solid var(--bdr);border-radius:7px;padding:5px 12px;
      font-family:'Heebo',sans-serif;font-size:.78rem;color:var(--mu);cursor:pointer}
.lout:hover{border-color:var(--rd);color:var(--rd)}

/* MAIN */
.main{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
.slot-panel{display:none}.slot-panel.active{display:block}
.signed-banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:12px 18px;
               display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sbtext{font-size:.88rem;font-weight:700;color:#92400e}
.resetbtn{background:#fff;border:1px solid #f59e0b;color:#d97706;border-radius:7px;
          padding:5px 14px;font-family:'Heebo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer}

/* SECTION ACCORDIONS */
.sec-accordion{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);
               margin-bottom:12px;overflow:hidden}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
          cursor:pointer;transition:background .15s}
.sec-head:hover{background:#f9fafb}
.sec-head-l{display:flex;align-items:center;gap:10px}
.sec-icon{width:32px;height:32px;border-radius:8px;background:var(--bl);
          display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.sec-title{font-size:.92rem;font-weight:800;color:var(--navy)}
.sec-arr{color:var(--mu);transition:transform .2s;font-size:.8rem}
.sec-accordion.open .sec-arr{transform:rotate(180deg)}
.sec-body{display:none;padding:18px 20px;border-top:1px solid var(--bdr)}
.sec-accordion.open .sec-body{display:block}

/* FIELDS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.frow.s1{grid-template-columns:1fr}
.f{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mu)}
.fi{border:1.5px solid var(--bdr);border-radius:8px;padding:9px 12px;
    font-family:'Heebo',sans-serif;font-size:.88rem;color:var(--sub);
    transition:border-color .2s;background:#fafbff;width:100%}
.fi:focus{outline:none;border-color:var(--blue);background:#fff}
textarea.fi{resize:vertical;min-height:80px;line-height:1.65}

/* BLOCKS (milestones, terms, etc) */
.blocks-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.block-card{border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden}
.block-top{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg)}
.bnum{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;
      font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btitle-inp{flex:1;border:none;background:transparent;font-family:'Heebo',sans-serif;
            font-size:.88rem;font-weight:700;color:var(--navy);padding:2px 4px;border-radius:4px}
.btitle-inp:focus{outline:1px solid var(--bm);background:#fff}
.bdel{background:none;border:none;cursor:pointer;color:var(--fa);font-size:1.1rem;
      padding:2px 6px;border-radius:4px;line-height:1;transition:color .15s}
.bdel:hover{color:var(--rd)}
.block-body{padding:9px 12px}
.btext-inp{width:100%;border:none;background:transparent;font-family:'Heebo',sans-serif;
           font-size:.83rem;color:var(--sub);resize:vertical;min-height:64px;line-height:1.7;padding:2px}
.btext-inp:focus{outline:1px solid var(--bm);background:#fafbff;border-radius:4px}
.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;
         background:var(--bl);border:1.5px dashed var(--bm);color:var(--blue);
         border-radius:9px;padding:9px;font-family:'Heebo',sans-serif;font-size:.83rem;
         font-weight:700;cursor:pointer;width:100%;transition:all .15s}
.add-btn:hover{background:var(--blue);color:#fff;border-style:solid}

/* WHY ITEMS */
.why-inp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.why-inp-row{display:flex;align-items:center;gap:8px}
.why-inp-row input{flex:1}.why-inp-row .bdel{padding:6px 8px}

/* CLIENTS GRID */
.cl-chk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.cl-card{border:1.5px solid var(--bdr);border-radius:9px;padding:9px;cursor:pointer;
         text-align:center;transition:all .15s;position:relative}
.cl-card:hover{border-color:var(--bm)}
.cl-card.sel{border-color:var(--blue);background:var(--bl)}
.cl-card input{position:absolute;opacity:0;pointer-events:none}
.cl-img{width:100%;height:38px;object-fit:contain;margin-bottom:5px;filter:grayscale(.4)}
.cl-card.sel .cl-img{filter:none}
.cl-name{font-size:.68rem;font-weight:700;color:var(--sub)}
.cl-card.sel .cl-name{color:var(--blue)}
.chkmark{position:absolute;top:5px;left:5px;width:16px;height:16px;border-radius:50%;
         background:var(--blue);display:none;align-items:center;justify-content:center}
.chkmark svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5}
.cl-card.sel .chkmark{display:flex}

/* COSTS / TABLE EDITOR */
.table-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.table-row{display:flex;align-items:center;gap:8px}
.table-row input{flex:1}.table-row .bdel{padding:6px 8px;flex-shrink:0}
.pay-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.pay-row{border:1px solid var(--bdr);border-radius:10px;padding:12px 14px}
.pay-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pay-row-num{font-size:.72rem;font-weight:800;color:var(--mu)}

/* TOKEN PACKAGES */
.tok-pkg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.tok-pkg-row{display:flex;align-items:center;gap:8px}
.tok-pkg-row input{flex:1}

/* LINK BOX */
.link-box{background:#f0f3ff;border:1px solid var(--bm);border-radius:9px;
          padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:8px}
.link-url{font-size:.8rem;color:var(--blue);font-weight:600;direction:ltr;text-align:left;flex:1;word-break:break-all}
.copy-btn{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;
          font-family:'Heebo',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;flex-shrink:0}
.copy-btn:hover{background:var(--navy)}
.copy-btn.ok{background:var(--gr)}

/* SAVE */
.save-wrap{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--bdr);
           padding:14px 20px;margin:0 -20px;z-index:50}
.save-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;
          font-family:'Heebo',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;
          display:flex;align-items:center;justify-content:center;gap:8px;
          transition:all .2s;box-shadow:0 4px 12px rgba(26,86,219,.25)}
.save-btn:hover:not(:disabled){background:var(--navy)}
.save-btn:disabled{opacity:.55;cursor:not-allowed}
.save-sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
         border-radius:50%;animation:spin .6s linear infinite;display:none}
.save-msg{text-align:center;font-size:.82rem;font-weight:700;height:18px;margin-top:6px}
.save-msg.ok{color:var(--gr)}.save-msg.err{color:var(--rd)}
@media(max-width:700px){.topbar{padding:0 12px}.tabs{gap:3px}.tab{padding:5px 10px;font-size:.75rem}
  .main{padding:16px 12px 60px}.frow{grid-template-columns:1fr}.cl-chk-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="lw">
  <div class="lbox">
    <div class="llogo">yeda</div>
    <div class="lsub">ממשק ניהול חוזים</div>
    <input class="linp" type="password" id="pw" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">כניסה</button>
    <div class="lerr" id="lerr">סיסמה שגויה</div>
  </div>
</div>
<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tlogo">yeda</div>
    <div class="tabs" id="tabRow">
      <button class="tab active" data-s="1" onclick="switchSlot(1)">חוזה 1</button>
      <button class="tab" data-s="2" onclick="switchSlot(2)">חוזה 2</button>
      <button class="tab" data-s="3" onclick="switchSlot(3)">חוזה 3</button>
    </div>
    <button class="lout" onclick="doLogout()">יציאה</button>
  </div>
  <div class="main">
    <div class="slot-panel active" id="p1"></div>
    <div class="slot-panel" id="p2"></div>
    <div class="slot-panel" id="p3"></div>
  </div>
</div>

let pw='',cur=1,sd={1:null,2:null,3:null};

function doLogin(){
  const v=document.getElementById('pw').value;

  pw=v;document.getElementById('lw').style.display='none';document.getElementById('app').style.display='block';

}
function doLogout(){pw='';document.getElementById('lw').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('pw').value=''}
async function loadAll(){for(let s=1;s<=3;s++){try{const r=await fetch(N8N_LOAD,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify({slot:s,password:pw,mode:'admin'})});const d=await r.json();sd[s]=d.title?d:null}catch(e){sd[s]=null}renderPanel(s);updateTab(s)}}

/* ── GETTERS ── */
function getMs(s){return Array.from(document.querySelectorAll(`[id^="ms-${s}-"]`)).map(el=>{const id=el.id.slice(('ms-'+s+'-').length);return{id,num:document.querySelectorAll(`[id^="ms-${s}-"]`).length>0?Array.from(document.querySelectorAll(`[id^="ms-${s}-"]`)).indexOf(el)+'':id,title:document.getElementById('mst-'+s+'-'+id)?.value||'',desc:document.getElementById('msd-'+s+'-'+id)?.value||''}})}
function getWhy(s){return Array.from(document.querySelectorAll(`[id^="wi-${s}-"]`)).map(el=>el.value).filter(Boolean)}
function getSel(s){return ALL_CLIENTS.map(c=>c.id).filter(id=>document.getElementById('cc-'+s+'-'+id)?.classList.contains('sel'))}
function getCostRows(s){return Array.from(document.querySelectorAll(`[id^="cr-${s}-"]`)).filter(el=>el.id.endsWith('-0')).map(el=>{const i=el.id.split('-')[2];return[document.getElementById(`cr-${s}-${i}-0`)?.value||'',document.getElementById(`cr-${s}-${i}-1`)?.value||'']})}
function getPayments(s){return Array.from(document.querySelectorAll(`[id^="pay-${s}-"]`)).map(el=>{const i=el.id.split('-')[2];return{num:parseInt(i)+1,title:document.getElementById(`pt-${s}-${i}`)?.value||'',desc:document.getElementById(`pd-${s}-${i}`)?.value||'',total:document.getElementById(`pp-${s}-${i}`)?.value||''}})}
function getOpts(s){return Array.from(document.querySelectorAll(`[id^="op-${s}-"]`)).filter(el=>el.id.endsWith('-t')).map(el=>{const i=el.id.split('-')[2];return{title:document.getElementById(`op-${s}-${i}-t`)?.value||'',price:document.getElementById(`op-${s}-${i}-p`)?.value||''}})}
function getTokPkgs(s){return Array.from(document.querySelectorAll(`[id^="tp-${s}-"]`)).filter(el=>el.id.endsWith('-a')).map(el=>{const i=el.id.split('-')[2];return{amount:document.getElementById(`tp-${s}-${i}-a`)?.value||'',original:document.getElementById(`tp-${s}-${i}-o`)?.value||'',sale:document.getElementById(`tp-${s}-${i}-s`)?.value||''}})}
function getTokExs(s){return Array.from(document.querySelectorAll(`[id^="te-${s}-"]`)).map(el=>el.value).filter(Boolean)}
function getTerms(s){return Array.from(document.querySelectorAll(`[id^="trm-${s}-"]`)).map(el=>{const id=el.id.slice(('trm-'+s+'-').length);return{id,title:document.getElementById('trt-'+s+'-'+id)?.value||'',text:document.getElementById('trb-'+s+'-'+id)?.value||''}})}

/* ── ADD/DELETE ── */
function addMs(s){const id='m'+Date.now(),ms=getMs(s);ms.push({id,num:ms.length,title:'',desc:''});const dd=document.getElementById('msl-'+s);const el=document.createElement('div');el.className='block-card';el.id='ms-'+s+'-'+id;el.innerHTML=`<div class="block-top"><div class="bnum">${ms.length-1}</div><input class="btitle-inp fi" id="mst-${s}-${id}" placeholder="כותרת אבן דרך"><button class="bdel" onclick="delMs(${s},'${id}')">×</button></div><div class="block-body"><textarea class="btext-inp fi" id="msd-${s}-${id}" placeholder="תיאור"></textarea></div>`;dd.appendChild(el);document.getElementById('mst-'+s+'-'+id)?.focus()}
function delMs(s,id){document.getElementById('ms-'+s+'-'+id)?.remove()}
function addWhy(s){const i=document.querySelectorAll(`[id^="wi-${s}-"]`).length;const l=document.getElementById('wil-'+s);const el=document.createElement('div');el.className='why-inp-row';el.innerHTML=`<input class="fi" id="wi-${s}-${i}" placeholder="יתרון"><button class="bdel" onclick="this.parentElement.remove()">×</button>`;l.appendChild(el);el.querySelector('input')?.focus()}
function delWhy(s,i){document.querySelector(`[id="wi-${s}-${i}"]`)?.parentElement?.remove()}
function tglCl(s,id){document.getElementById('cc-'+s+'-'+id)?.classList.toggle('sel')}
function addCostRow(s){const i=document.querySelectorAll(`[id^="cr-${s}-"]`).filter(el=>el.id.endsWith('-0')).length;const l=document.getElementById('crl-'+s);const el=document.createElement('div');el.className='table-row';el.innerHTML=`<input class="fi" id="cr-${s}-${i}-0" placeholder="פריט"><input class="fi" id="cr-${s}-${i}-1" placeholder="עלות"><button class="bdel" onclick="this.parentElement.remove()">×</button>`;l.appendChild(el)}
function delCostRow(s,i){const row=document.querySelector(`[id="cr-${s}-${i}-0"]`)?.closest('.table-row');row?.remove()}
function addPay(s){const i=document.querySelectorAll(`[id^="pay-${s}-"]`).length;const l=document.getElementById('payl-'+s);const el=document.createElement('div');el.className='pay-row';el.id='pay-'+s+'-'+i;el.innerHTML=`<div class="pay-row-head"><span class="pay-row-num">תשלום ${i+1}</span><button class="bdel" onclick="this.closest('.pay-row').remove()">×</button></div><div class="frow"><div class="f"><div class="fl">כותרת</div><input class="fi" id="pt-${s}-${i}" placeholder="כותרת תשלום"></div><div class="f"><div class="fl">סה"כ</div><input class="fi" id="pp-${s}-${i}" placeholder="סכום"></div></div><div class="f"><div class="fl">תיאור</div><textarea class="fi" id="pd-${s}-${i}" rows="2"></textarea></div>`;l.appendChild(el)}
function delPay(s,i){document.getElementById('pay-'+s+'-'+i)?.remove()}
function addOpt(s){const i=document.querySelectorAll(`[id^="op-${s}-"]`).filter(el=>el.id.endsWith('-t')).length;const l=document.getElementById('optl-'+s);const el=document.createElement('div');el.className='table-row';el.innerHTML=`<input class="fi" id="op-${s}-${i}-t" placeholder="שירות"><input class="fi" id="op-${s}-${i}-p" placeholder="מחיר"><button class="bdel" onclick="this.parentElement.remove()">×</button>`;l.appendChild(el)}
function delOpt(s,i){document.querySelector(`[id="op-${s}-${i}-t"]`)?.closest('.table-row')?.remove()}
function addTokEx(s){const i=document.querySelectorAll(`[id^="te-${s}-"]`).length;const l=document.getElementById('texl-'+s);const el=document.createElement('div');el.className='why-inp-row';el.innerHTML=`<input class="fi" id="te-${s}-${i}" placeholder="דוגמה"><button class="bdel" onclick="this.parentElement.remove()">×</button>`;l.appendChild(el);el.querySelector('input')?.focus()}
function delTokEx(s,i){document.querySelector(`[id="te-${s}-${i}"]`)?.parentElement?.remove()}
function addTerm(s){const id='t'+Date.now();const l=document.getElementById('trml-'+s);const i=l.children.length;const el=document.createElement('div');el.className='block-card';el.id='trm-'+s+'-'+id;el.innerHTML=`<div class="block-top"><div class="bnum">${i+1}</div><input class="btitle-inp fi" id="trt-${s}-${id}" placeholder="כותרת תנאי"><button class="bdel" onclick="delTerm(${s},'${id}')">×</button></div><div class="block-body"><textarea class="btext-inp fi" id="trb-${s}-${id}" placeholder="טקסט תנאי..." rows="3"></textarea></div>`;l.appendChild(el);document.getElementById('trt-'+s+'-'+id)?.focus()}
function delTerm(s,id){document.getElementById('trm-'+s+'-'+id)?.remove()}

/* ── SAVE ── */
async function saveSlot(s){
  const btn=document.getElementById('sbtn'+s),sp=document.getElementById('ssp'+s),tx=document.getElementById('stxt'+s),msg=document.getElementById('smsg'+s);
  btn.disabled=true;sp.style.display='block';tx.textContent='שומר...';
  const payload={slot:s,password:pw,signed:false,
    title:document.getElementById(s+'-title')?.value||'',
    client_name:document.getElementById(s+'-cname')?.value||'',
    matara:document.getElementById(s+'-matara')?.value||'',
    milestones:getMs(s),
    why_intro:document.getElementById(s+'-whyintro')?.value||'',
    why_items:getWhy(s),
    selected_clients:getSel(s),
    costs_subtitle:document.getElementById(s+'-csubt')?.value||'',
    costs_rows:getCostRows(s),payments:getPayments(s),optional:getOpts(s),
    token_packages:getTokPkgs(s),token_examples:getTokExs(s),
    terms:getTerms(s)};
  try{
    const r=await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('שגיאת שרת '+r.status);
    sd[s]=payload;updateTab(s);msg.textContent='✓ נשמר';msg.className='save-msg ok';setTimeout(()=>msg.textContent='',3000);
  }catch(e){msg.textContent='שגיאה: '+e.message;msg.className='save-msg err'}
  btn.disabled=false;sp.style.display='none';tx.textContent='שמור שינויים';
}

async function resetSlot(s){
  if(!confirm('לאפס החוזה? ניתן יהיה לחתום שוב'))return;
  const d=sd[s]||{};
  const payload={slot:s,password:pw,...d,signed:false,signer_name:'',signer_date:'',signer_email:''};
  try{await fetch(N8N_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});sd[s]=payload;renderPanel(s);updateTab(s)}catch(e){alert('שגיאה')}
}

async function copyLink(s){
  await navigator.clipboard.writeText(PROP_URL+'?slot='+s);
  const b=document.getElementById('cpbtn'+s);b.textContent='✓ הועתק';b.classList.add('ok');
  setTimeout(()=>{b.textContent='העתק';b.classList.remove('ok')},2500);
}

function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
