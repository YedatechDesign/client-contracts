<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>yeda — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2680;--blue:#1a56db;--blue-light:#e8f0fe;--blue-mid:#c7d7fc;
  --sub:#374151;--muted:#6b7280;--faint:#9ca3af;
  --bg:#f4f6fb;--white:#fff;--border:#e5e7eb;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08)
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--sub);direction:rtl;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:#fff;border-radius:var(--radius);border:1px solid var(--border);
           box-shadow:var(--shadow);padding:48px 40px;max-width:380px;width:100%;text-align:center}
.login-logo{font-size:2rem;font-weight:900;color:var(--navy);letter-spacing:-1.5px;margin-bottom:8px}
.login-sub{color:var(--muted);font-size:.85rem;margin-bottom:32px}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;
             font-family:'Heebo',sans-serif;font-size:.95rem;direction:ltr;text-align:center;
             margin-bottom:12px;transition:border-color .2s}
.login-input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;
           font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--navy)}
.login-err{color:var(--red);font-size:.8rem;margin-top:8px;display:none}

/* APP */
#app{display:none}
.top-bar{background:#fff;border-bottom:1px solid var(--border);height:56px;
         display:flex;align-items:center;justify-content:space-between;padding:0 28px;
         position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.top-logo{font-size:1.4rem;font-weight:900;color:var(--navy);letter-spacing:-1px}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;
            font-family:'Heebo',sans-serif;font-size:.8rem;color:var(--muted);cursor:pointer}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* SLOT TABS */
.slot-tabs{display:flex;gap:8px;padding:20px 28px 0;max-width:1100px;margin:0 auto}
.slot-tab{flex:1;padding:10px 16px;background:#fff;border:1.5px solid var(--border);border-radius:10px 10px 0 0;
          font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;
          color:var(--muted);transition:all .15s;text-align:center;position:relative}
.slot-tab:hover{color:var(--blue);border-color:var(--blue-mid)}
.slot-tab.active{background:#fff;border-color:var(--blue);border-bottom-color:#fff;color:var(--blue);
                 font-weight:800;z-index:1}
.slot-tab .signed-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
                       background:var(--green);margin-right:6px;vertical-align:middle}

/* MAIN CONTENT */
.main{max-width:1100px;margin:0 auto;padding:0 28px 40px}
.slot-panel{display:none;background:#fff;border:1.5px solid var(--border);border-radius:0 0 var(--radius) var(--radius);
            border-top:none;padding:28px}
.slot-panel.active{display:block}

/* SIGNED BANNER */
.signed-banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;
               padding:12px 18px;display:flex;align-items:center;justify-content:space-between;
               margin-bottom:20px}
.signed-banner-text{font-size:.875rem;font-weight:700;color:#92400e}
.reset-btn{background:#fff;border:1px solid #f59e0b;color:#d97706;border-radius:7px;
           padding:5px 14px;font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;
           cursor:pointer;transition:all .2s}
.reset-btn:hover{background:#fef3c7}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.field input,.field textarea{border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;
                              font-family:'Heebo',sans-serif;font-size:.9rem;color:var(--sub);
                              transition:border-color .2s;background:#fafbff}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}

/* DIVIDER */
.section-title{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
               color:var(--muted);margin:24px 0 12px;padding-bottom:8px;
               border-bottom:1.5px solid var(--border)}

/* BLOCKS */
.blocks-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.block-item{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.block-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8faff;
              border-bottom:1px solid var(--border)}
.block-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;
           font-size:.75rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.block-title-input{flex:1;border:none;background:transparent;font-family:'Heebo',sans-serif;
                   font-size:.9rem;font-weight:700;color:var(--navy);padding:2px 4px;border-radius:4px}
.block-title-input:focus{outline:1px solid var(--blue-mid);background:#fff}
.block-del{background:none;border:none;cursor:pointer;color:var(--faint);font-size:1.1rem;padding:2px 6px;
           border-radius:4px;transition:color .15s;line-height:1}
.block-del:hover{color:var(--red)}
.block-body{padding:10px 14px}
.block-text-input{width:100%;border:none;background:transparent;font-family:'Heebo',sans-serif;
                  font-size:.875rem;color:var(--sub);resize:vertical;min-height:72px;line-height:1.7;padding:2px}
.block-text-input:focus{outline:1px solid var(--blue-mid);background:#fafbff;border-radius:4px}
.add-block-btn{display:flex;align-items:center;gap:7px;background:var(--blue-light);
               border:1.5px dashed var(--blue-mid);color:var(--blue);border-radius:9px;
               padding:9px 18px;font-family:'Heebo',sans-serif;font-size:.875rem;font-weight:700;
               cursor:pointer;transition:all .15s;width:100%;justify-content:center}
.add-block-btn:hover{background:var(--blue);color:#fff;border-style:solid}

/* CLIENTS */
.clients-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
.client-check-card{border:1.5px solid var(--border);border-radius:9px;padding:10px;
                   cursor:pointer;transition:all .15s;text-align:center;position:relative}
.client-check-card:hover{border-color:var(--blue-mid)}
.client-check-card.selected{border-color:var(--blue);background:var(--blue-light)}
.client-check-card input{position:absolute;opacity:0;pointer-events:none}
.client-logo-thumb{width:100%;height:44px;object-fit:contain;margin-bottom:6px;filter:grayscale(.4)}
.client-check-card.selected .client-logo-thumb{filter:none}
.client-check-name{font-size:.72rem;font-weight:700;color:var(--sub)}
.client-check-card.selected .client-check-name{color:var(--blue)}
.check-mark{position:absolute;top:6px;left:6px;width:18px;height:18px;border-radius:50%;
            background:var(--blue);display:none;align-items:center;justify-content:center}
.check-mark svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5}
.client-check-card.selected .check-mark{display:flex}

/* LINK BOX */
.link-box{background:#f0f3ff;border:1px solid var(--blue-mid);border-radius:9px;
          padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.link-url{font-size:.8rem;color:var(--blue);font-weight:600;direction:ltr;text-align:left;word-break:break-all;flex:1}
.copy-btn{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;
          font-family:'Heebo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;flex-shrink:0;
          transition:background .15s}
.copy-btn:hover{background:var(--navy)}
.copy-btn.ok{background:var(--green)}

/* ACTIONS */
.actions{display:flex;gap:12px;margin-top:20px;padding-top:20px;border-top:1.5px solid var(--border)}
.save-btn{flex:1;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;
          font-family:'Heebo',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;
          display:flex;align-items:center;justify-content:center;gap:8px;
          transition:all .2s;box-shadow:0 4px 12px rgba(26,86,219,.25)}
.save-btn:hover:not(:disabled){background:var(--navy);box-shadow:0 6px 18px rgba(26,86,219,.3)}
.save-btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
    border-radius:50%;animation:spin .6s linear infinite;display:none}
.save-msg{font-size:.82rem;font-weight:700;text-align:center;height:20px;margin-top:6px}
.save-msg.ok{color:var(--green)}.save-msg.err{color:var(--red)}

@media(max-width:700px){
  .top-bar{padding:0 14px}.main{padding:0 12px 32px}
  .slot-tabs{padding:16px 12px 0;gap:4px}
  .slot-panel{padding:16px}
  .form-row{grid-template-columns:1fr}
  .clients-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">yeda</div>
    <div class="login-sub">ממשק ניהול חוזים</div>
    <input class="login-input" type="password" id="pw" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-err" id="login-err">סיסמה שגויה</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-logo">yeda</div>
    <button class="logout-btn" onclick="doLogout()">יציאה</button>
  </div>

  <div class="slot-tabs" id="slot-tabs">
    <button class="slot-tab active" data-slot="1" onclick="switchSlot(1)">חוזה 1</button>
    <button class="slot-tab" data-slot="2" onclick="switchSlot(2)">חוזה 2</button>
    <button class="slot-tab" data-slot="3" onclick="switchSlot(3)">חוזה 3</button>
  </div>

  <div class="main">
    <!-- 3 slot panels -->
    <div class="slot-panel active" id="panel-1"><!-- built by JS --></div>
    <div class="slot-panel" id="panel-2"></div>
    <div class="slot-panel" id="panel-3"></div>
  </div>
</div>

<script>
const PASS         = 'yedacontracts2026';
const N8N_SAVE     = 'https://yedauto.com/webhook/yeda-save';
const N8N_LOAD     = 'https://yedauto.com/webhook/yeda-load';
const PROPOSAL_URL = 'https://yedatechdesign.github.io/client-contracts/proposal.html';
const LOGOS_BASE   = 'https://yedatechdesign.github.io/client-contracts/logos/';

const ALL_CLIENTS = [
  { id:'client1',  name:'HackerU',                desc:'המכללה המובילה בארץ להכשרה במקצועות סייבר והייטק', url:'https://www.hackeru.co.il/' },
  { id:'client2',  name:'מכללת IPC',              desc:'המכללה המובילה בתחום ההכשרות המקצועיות',           url:'https://campus-ipc.co.il/' },
  { id:'client3',  name:'מכללת אורין שפלטר',      desc:'המכללה המובילה להוראה הפיננסית',                   url:'https://oscrypto.academy/' },
  { id:'client4',  name:'ThriveDX',               desc:'חברה גלובלית המתמחה בהכשרות דיגיטליות',           url:'https://thrivedx.com/' },
  { id:'client5',  name:'מרכז גומא גבים',         desc:'המכללה המובילה לגישור, אימון ולימודי משפחה',      url:'https://study.gomegevim.co.il/' },
  { id:'client6',  name:'מכללת קול המס',          desc:'מכללה בפיקוח לשכת רו"ח ולשכת יועצי המס',         url:'https://finance-courses.co.il/' },
  { id:'client7',  name:'HIGHQ',                  desc:'המכללה המובילה בישראל להכנה לבחינות ופסיכומטרי',  url:'https://www.high-q.co.il/' },
  { id:'client8',  name:'פירמת עורכי הדין פישר', desc:'משרדי עורכי הדין הגדולים והמובילים בישראל',       url:'https://www.fbclawyers.com/' },
  { id:'client9',  name:'קבוצת מובמנט',          desc:'החברה המובילה בארץ לקידום בריאות בארגונים',       url:'https://online.allencarr.co.il/' },
  { id:'client10', name:'אולג׳ובס',              desc:'האתר המוביל לחיפוש עבודה',                         url:'https://allcourses.co.il/' },
  { id:'client11', name:'מלם טים',               desc:'קבוצת שירותי ה-IT המובילה בישראל',                 url:'https://academia.teamcad.co.il/' },
  { id:'client12', name:'כלכליסט',               desc:'אתר החדשות הכלכלי המוביל בישראל',                  url:'https://study.calcalist.co.il/' },
];

const DEFAULT_BLOCKS = [
  { id:'b1', title:'מטרה', text:'הסכם זה נועד להסדיר את תנאי ההתקשרות בין הצדדים.' },
  { id:'b2', title:'שירותים', text:'חברת ידע תספק ללקוח את שירותי הפלטפורמה הדיגיטלית.' },
];

let currentSlot = 1;
let slotData = { 1: null, 2: null, 3: null };
let password = '';

// ── LOGIN ──
function doLogin() {
  const pw = document.getElementById('pw').value;
  if (pw !== PASS) { document.getElementById('login-err').style.display='block'; return; }
  password = pw;
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAllSlots();
}
function doLogout() {
  password = '';
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw').value = '';
}

// ── LOAD ──
async function loadAllSlots() {
  for (let s = 1; s <= 3; s++) {
    try {
      const r = await fetch(N8N_LOAD, {
        method:'POST', headers:{'Content-Type':'application/json'},
        cache:'no-store',
        body: JSON.stringify({ slot:s, password, mode:'admin' })
      });
      const d = await r.json();
      slotData[s] = d.content === '' ? null : d;
    } catch(e) { slotData[s] = null; }
    renderPanel(s);
    updateTabLabel(s);
  }
}

// ── RENDER PANEL ──
function renderPanel(slot) {
  const d = slotData[slot] || {};
  const signed = d.signed === true;
  const blocks = d.blocks || DEFAULT_BLOCKS;
  const selClients = d.selected_clients || [];
  const panel = document.getElementById('panel-' + slot);

  panel.innerHTML = `
    ${signed ? `<div class="signed-banner">
      <div class="signed-banner-text">✓ נחתם על ידי ${d.signer_name||''} — ${d.signer_date||''}</div>
      <button class="reset-btn" onclick="resetSlot(${slot})">🗑 נקה ואפס</button>
    </div>` : ''}

    <div class="form-row">
      <div class="field">
        <label>כותרת ההסכם</label>
        <input type="text" id="s${slot}-title" value="${escH(d.title||'הצעת מחיר – פיתוח מערכת מותאמת אישית')}" ${signed?'disabled':''}>
      </div>
      <div class="field">
        <label>שם הלקוח</label>
        <input type="text" id="s${slot}-client-name" value="${escH(d.client_name||'')}" placeholder="שם חברת הלקוח" ${signed?'disabled':''}>
      </div>
    </div>

    <div class="section-title">בלוקי תוכן ההסכם</div>
    <div class="blocks-list" id="s${slot}-blocks"></div>
    ${!signed ? `<button class="add-block-btn" onclick="addBlock(${slot})">+ הוסף בלוק</button>` : ''}

    <div class="section-title">לקוחות מובילים להצגה</div>
    <div class="clients-grid" id="s${slot}-clients"></div>

    <div class="section-title">קישור לחתימה</div>
    <div class="link-box">
      <div class="link-url">${PROPOSAL_URL}?slot=${slot}</div>
      <button class="copy-btn" id="copy-btn-${slot}" onclick="copyLink(${slot})">העתק</button>
    </div>

    ${!signed ? `
    <div class="actions">
      <button class="save-btn" id="save-btn-${slot}" onclick="saveSlot(${slot})">
        <div class="sp" id="sp-${slot}"></div>
        <span id="save-txt-${slot}">שמור</span>
      </button>
    </div>
    <div class="save-msg" id="save-msg-${slot}"></div>` : ''}
  `;

  renderBlocks(slot, blocks, signed);
  renderClientsGrid(slot, selClients, signed);
}

// ── BLOCKS ──
function renderBlocks(slot, blocks, disabled) {
  const container = document.getElementById('s' + slot + '-blocks');
  container.innerHTML = blocks.map((b, i) => `
    <div class="block-item" id="block-${slot}-${b.id}">
      <div class="block-header">
        <div class="block-num">${i+1}</div>
        <input class="block-title-input" id="bt-${slot}-${b.id}" value="${escH(b.title)}" placeholder="כותרת בלוק" ${disabled?'disabled':''}>
        ${!disabled ? `<button class="block-del" onclick="deleteBlock(${slot},'${b.id}')" title="מחק">×</button>` : ''}
      </div>
      <div class="block-body">
        <textarea class="block-text-input" id="bb-${slot}-${b.id}" placeholder="תוכן הבלוק..." ${disabled?'disabled':''}>${escH(b.text)}</textarea>
      </div>
    </div>`).join('');
}

function addBlock(slot) {
  const blocks = getBlocks(slot);
  const id = 'b' + Date.now();
  blocks.push({ id, title:'', text:'' });
  renderBlocks(slot, blocks, false);
  document.getElementById('bt-' + slot + '-' + id)?.focus();
}

function deleteBlock(slot, id) {
  const blocks = getBlocks(slot).filter(b => b.id !== id);
  renderBlocks(slot, blocks, false);
}

function getBlocks(slot) {
  const list = document.querySelectorAll('#s' + slot + '-blocks .block-item');
  return Array.from(list).map(el => {
    const id = el.id.split('-').slice(2).join('-');
    return {
      id,
      title: document.getElementById('bt-' + slot + '-' + id)?.value || '',
      text:  document.getElementById('bb-' + slot + '-' + id)?.value || ''
    };
  });
}

// ── CLIENTS GRID ──
function renderClientsGrid(slot, selected, disabled) {
  const container = document.getElementById('s' + slot + '-clients');
  container.innerHTML = ALL_CLIENTS.map(c => {
    const sel = selected.includes(c.id);
    return `
      <div class="client-check-card ${sel?'selected':''}" id="cc-${slot}-${c.id}"
           onclick="${!disabled ? `toggleClient(${slot},'${c.id}')` : ''}">
        <div class="check-mark"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <img class="client-logo-thumb" src="${LOGOS_BASE}${c.id}.png" alt="${c.name}" onerror="this.style.opacity='.3'">
        <div class="client-check-name">${c.name}</div>
      </div>`;
  }).join('');
}

function toggleClient(slot, id) {
  const el = document.getElementById('cc-' + slot + '-' + id);
  el.classList.toggle('selected');
}

function getSelectedClients(slot) {
  return ALL_CLIENTS.map(c => c.id)
    .filter(id => document.getElementById('cc-' + slot + '-' + id)?.classList.contains('selected'));
}

// ── SAVE ──
async function saveSlot(slot) {
  const btn = document.getElementById('save-btn-' + slot);
  const sp  = document.getElementById('sp-' + slot);
  const txt = document.getElementById('save-txt-' + slot);
  const msg = document.getElementById('save-msg-' + slot);
  btn.disabled = true; sp.style.display = 'block'; txt.textContent = 'שומר...';

  const payload = {
    slot,
    password,
    title:            document.getElementById('s' + slot + '-title')?.value || '',
    client_name:      document.getElementById('s' + slot + '-client-name')?.value || '',
    blocks:           getBlocks(slot),
    selected_clients: getSelectedClients(slot),
    signed: false
  };

  try {
    const r = await fetch(N8N_SAVE, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error('שגיאת שרת ' + r.status);
    slotData[slot] = payload;
    msg.textContent = '✓ נשמר בהצלחה'; msg.className = 'save-msg ok';
    setTimeout(() => msg.textContent = '', 3000);
  } catch(e) {
    msg.textContent = 'שגיאה: ' + e.message; msg.className = 'save-msg err';
  }
  btn.disabled = false; sp.style.display = 'none'; txt.textContent = 'שמור';
}

async function resetSlot(slot) {
  if (!confirm('לאפס את החוזה? הלקוח יוכל לחתום שוב')) return;
  const d = slotData[slot] || {};
  const payload = {
    slot, password,
    title:            d.title || '',
    client_name:      d.client_name || '',
    blocks:           d.blocks || DEFAULT_BLOCKS,
    selected_clients: d.selected_clients || [],
    signed: false
  };
  try {
    const r = await fetch(N8N_SAVE, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!r.ok) throw new Error();
    slotData[slot] = payload;
    renderPanel(slot);
    updateTabLabel(slot);
  } catch(e) { alert('שגיאה באיפוס'); }
}

// ── TABS ──
function switchSlot(s) {
  currentSlot = s;
  document.querySelectorAll('.slot-tab').forEach(t => t.classList.toggle('active', +t.dataset.slot === s));
  document.querySelectorAll('.slot-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + s).classList.add('active');
}

function updateTabLabel(slot) {
  const d = slotData[slot];
  const tab = document.querySelector(`.slot-tab[data-slot="${slot}"]`);
  const name = d?.client_name ? d.client_name : 'חוזה ' + slot;
  const dot  = d?.signed ? '<span class="signed-dot"></span>' : '';
  tab.innerHTML = dot + name;
}

// ── COPY ──
async function copyLink(slot) {
  const url = PROPOSAL_URL + '?slot=' + slot;
  await navigator.clipboard.writeText(url);
  const btn = document.getElementById('copy-btn-' + slot);
  btn.textContent = '✓ הועתק'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'העתק'; btn.classList.remove('ok'); }, 2000);
}

function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
